repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-zero]
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.13
    hooks:
      - id: uv-lock
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # Lint only repo-owned shell scripts; the vendored android/gradlew wrapper
        # is Gradle-generated and not maintained here.
        files: ^scripts/.*\.sh$
        args: [--severity=warning]
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        # Format repo-owned shell scripts: 4-space indent, indented case bodies.
        files: ^scripts/.*\.sh$
        args: [-w, -i, '4', -ci]
  - repo: local
    hooks:
      - id: upstream-source-no-pin
        # Fail if the Git-tracked upstream.source regains an upstream_commit pin.
        # The project tracks the latest upstream HEAD; a roadblock pin belongs in
        # the Git-ignored upstream.lock, never in upstream.source.
        name: upstream.source pins no commit
        entry: scripts/upstream-sync/upstream.sh verify-source-policy
        language: script
        files: ^upstream\.source$
        pass_filenames: false
      - id: docs-lint
        # Docs rot gate: dead internal links, dead script paths named in prose,
        # stray non-ASCII, a pointer to a file under the git-ignored __DEV/, and a
        # broken CLAUDE.md @AGENTS.md import. The script discovers its own file
        # set through `git ls-files`, so it lints every tracked doc, not only the
        # staged ones; it needs no toolchain and runs in seconds.
        name: docs rot gate
        entry: scripts/docs/run_docs_lint.sh
        language: script
        files: \.md$
        pass_filenames: false
