# Keep the SHA-pinned GitHub Actions current. The workflows pin every third
# party action to a full commit SHA with a reviewed `# vX.Y.Z` comment; manual
# pins go stale silently, so Dependabot proposes the bump (SHA + comment) on a
# weekly cadence for review. Grouped into one PR to keep the review surface
# small.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
