name: Set up Android SDK
description: Provision the pinned Android SDK packages (optionally the emulator and x86_64 system image), accept licenses, cache them, and expose ANDROID_HOME/ANDROID_SDK_ROOT.

inputs:
  compile-sdk:
    description: Android compileSdk / platform level to install.
    required: true
  build-tools-version:
    description: Android build-tools version to install.
    required: true
  cmake-version:
    description: CMake version to install through the SDK manager.
    required: true
  ndk-version:
    description: NDK version to install.
    required: true
  include-emulator:
    description: When 'true', also install and cache the emulator and the default x86_64 system image for android-test-api-level.
    required: false
    default: 'false'
  android-test-api-level:
    description: System-image API level to install when include-emulator is 'true'.
    required: false
    default: ''

outputs:
  sdk_root:
    description: Resolved Android SDK root (ANDROID_SDK_ROOT).
    value: ${{ steps.android-sdk.outputs.sdk_root }}

runs:
  using: composite
  steps:
    - name: Select writable Android SDK root
      shell: bash
      run: | # zizmor: ignore[github-env] writes only the action-computed SDK root, not attacker input
        set -euo pipefail

        sdk_root="$HOME/.android/sdk"
        mkdir -p "$sdk_root"
        echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
        echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

    - name: Set up Android SDK command-line tools
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      with:
        # Override the action default (`tools platform-tools`): the legacy
        # `tools` package is deprecated, unused here, drags in the emulator as a
        # dependency on every run, and its unpinned download is a flake source.
        # The pinned packages are installed below; only adb (platform-tools)
        # comes from the action.
        packages: platform-tools

    - name: Accept Android SDK licenses non-interactively
      shell: bash
      run: |
        set -euo pipefail

        sdkmanager_bin="$(command -v sdkmanager || true)"
        if [[ -z "$sdkmanager_bin" ]]; then
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          for candidate in \
            "$sdk_root/cmdline-tools/latest/bin/sdkmanager" \
            "$sdk_root/cmdline-tools/20.0/bin/sdkmanager" \
            "$sdk_root/cmdline-tools/19.0/bin/sdkmanager"; do
            if [[ -x "$candidate" ]]; then
              sdkmanager_bin="$candidate"
              break
            fi
          done
        fi

        if [[ -z "$sdkmanager_bin" ]]; then
          echo "Unable to locate sdkmanager after setup-android." >&2
          exit 1
        fi

        set +o pipefail
        yes | "$sdkmanager_bin" --licenses > /dev/null
        license_status=${PIPESTATUS[1]}
        set -o pipefail
        if [ "$license_status" -ne 0 ]; then
          echo "Android SDK license acceptance failed (status $license_status)." >&2
          exit "$license_status"
        fi

    - name: Resolve Android SDK cache paths
      id: android-sdk
      shell: bash
      run: |
        set -euo pipefail

        sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
        if [[ -z "$sdk_root" ]]; then
          echo "Failed to resolve Android SDK root." >&2
          exit 1
        fi

        echo "sdk_root=$sdk_root" >> "$GITHUB_OUTPUT"

    - name: Restore Android SDK packages cache
      id: android-sdk-cache-build
      if: inputs.include-emulator != 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ steps.android-sdk.outputs.sdk_root }}/licenses
          ${{ steps.android-sdk.outputs.sdk_root }}/platform-tools
          ${{ steps.android-sdk.outputs.sdk_root }}/platforms/android-${{ inputs.compile-sdk }}*
          ${{ steps.android-sdk.outputs.sdk_root }}/build-tools/${{ inputs.build-tools-version }}
          ${{ steps.android-sdk.outputs.sdk_root }}/cmake/${{ inputs.cmake-version }}
          ${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ inputs.ndk-version }}
        key: ${{ runner.os }}-android-sdk-${{ inputs.compile-sdk }}-${{ inputs.build-tools-version }}-${{ inputs.cmake-version }}-${{ inputs.ndk-version }}-v3

    - name: Restore Android SDK packages cache with emulator
      id: android-sdk-cache-emulator
      if: inputs.include-emulator == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ steps.android-sdk.outputs.sdk_root }}/licenses
          ${{ steps.android-sdk.outputs.sdk_root }}/platform-tools
          ${{ steps.android-sdk.outputs.sdk_root }}/platforms/android-${{ inputs.compile-sdk }}*
          ${{ steps.android-sdk.outputs.sdk_root }}/build-tools/${{ inputs.build-tools-version }}
          ${{ steps.android-sdk.outputs.sdk_root }}/cmake/${{ inputs.cmake-version }}
          ${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ inputs.ndk-version }}
          ${{ steps.android-sdk.outputs.sdk_root }}/emulator
          ${{ steps.android-sdk.outputs.sdk_root }}/system-images/android-${{ inputs.android-test-api-level }}/default/x86_64
        key: ${{ runner.os }}-android-sdk-${{ inputs.compile-sdk }}-${{ inputs.build-tools-version }}-${{ inputs.cmake-version }}-${{ inputs.ndk-version }}-${{ inputs.android-test-api-level }}-default-x86_64-v3

    - name: Install Android SDK packages
      if: inputs.include-emulator != 'true' && steps.android-sdk-cache-build.outputs.cache-hit != 'true'
      shell: bash
      env:
        COMPILE_SDK: ${{ inputs.compile-sdk }}
        BUILD_TOOLS_VERSION: ${{ inputs.build-tools-version }}
        CMAKE_VERSION: ${{ inputs.cmake-version }}
        NDK_VERSION: ${{ inputs.ndk-version }}
      run: |
        set -euo pipefail

        sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
        # Some api levels ship under the bare platform id (android-36) and newer
        # ones under the minor-version id (android-37.0). Resolve whichever this
        # api uses so compile-sdk stays the plain integer Gradle expects.
        platform_pkg="platforms;android-${COMPILE_SDK}"
        if [ ! -d "${sdk_root}/platforms/android-${COMPILE_SDK}" ] &&
          sdkmanager --list 2>/dev/null | grep -Fq "platforms;android-${COMPILE_SDK}.0"; then
          platform_pkg="platforms;android-${COMPILE_SDK}.0"
        fi

        sdkmanager \
          "${platform_pkg}" \
          "build-tools;${BUILD_TOOLS_VERSION}" \
          "cmake;${CMAKE_VERSION}" \
          "ndk;${NDK_VERSION}"

    - name: Install Android SDK packages with emulator
      if: inputs.include-emulator == 'true' && steps.android-sdk-cache-emulator.outputs.cache-hit != 'true'
      shell: bash
      env:
        COMPILE_SDK: ${{ inputs.compile-sdk }}
        BUILD_TOOLS_VERSION: ${{ inputs.build-tools-version }}
        CMAKE_VERSION: ${{ inputs.cmake-version }}
        NDK_VERSION: ${{ inputs.ndk-version }}
        ANDROID_TEST_API_LEVEL: ${{ inputs.android-test-api-level }}
      run: |
        set -euo pipefail

        sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
        # Some api levels ship under the bare platform id (android-36) and newer
        # ones under the minor-version id (android-37.0). Resolve whichever this
        # api uses so compile-sdk stays the plain integer Gradle expects.
        platform_pkg="platforms;android-${COMPILE_SDK}"
        if [ ! -d "${sdk_root}/platforms/android-${COMPILE_SDK}" ] &&
          sdkmanager --list 2>/dev/null | grep -Fq "platforms;android-${COMPILE_SDK}.0"; then
          platform_pkg="platforms;android-${COMPILE_SDK}.0"
        fi

        sdkmanager \
          "${platform_pkg}" \
          "build-tools;${BUILD_TOOLS_VERSION}" \
          "cmake;${CMAKE_VERSION}" \
          "ndk;${NDK_VERSION}" \
          "emulator" \
          "system-images;android-${ANDROID_TEST_API_LEVEL};default;x86_64"
