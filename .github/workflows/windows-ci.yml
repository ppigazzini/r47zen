name: Windows CI

on:
  workflow_dispatch:
  schedule:
    - cron: '34 3 * * *'
  push:
    branches:
      - github_ci

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream core revision
    uses: ./.github/workflows/resolve-upstream-core.yml
    with:
      mode: latest

  windows-simulator:
    name: Build Windows simulator (${{ matrix.label }})
    needs:
      - resolve-upstream-core
    runs-on: windows-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: UCRT64
            msystem: UCRT64
            package_prefix: mingw-w64-ucrt-x86_64
            compiler_check: gcc --version
            artifact_suffix: ucrt64
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Configure Git defaults
        shell: pwsh
        run: |
          git config --global core.autocrlf input
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Set up MSYS2 ${{ matrix.msystem }}
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: ${{ matrix.msystem }}
          cache: true
          update: true
          path-type: minimal
          install: >-
            git
            make
            unzip
            zip
            ${{ matrix.package_prefix }}-adwaita-icon-theme
            ${{ matrix.package_prefix }}-ca-certificates
            ${{ matrix.package_prefix }}-cc
            ${{ matrix.package_prefix }}-ccache
            ${{ matrix.package_prefix }}-freetype
            ${{ matrix.package_prefix }}-glib-networking
            ${{ matrix.package_prefix }}-gsettings-desktop-schemas
            ${{ matrix.package_prefix }}-gmp
            ${{ matrix.package_prefix }}-gtk3
            ${{ matrix.package_prefix }}-hicolor-icon-theme
            ${{ matrix.package_prefix }}-meson
            ${{ matrix.package_prefix }}-ninja
            ${{ matrix.package_prefix }}-pkgconf
            ${{ matrix.package_prefix }}-shared-mime-info
            ${{ matrix.package_prefix }}-xlsxio

      - name: Restore compiler cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/ccache-${{ matrix.artifact_suffix }}
          key: ${{ runner.os }}-${{ matrix.artifact_suffix }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.artifact_suffix }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-${{ matrix.artifact_suffix }}-ccache-

      - name: Configure compiler cache
        run: |
          set -euo pipefail

          ccache_dir="$(cygpath -u "$RUNNER_TEMP")/ccache-${{ matrix.artifact_suffix }}"
          workspace_dir="$(cygpath -u "$GITHUB_WORKSPACE")"
          mkdir -p "$ccache_dir"

          {
            echo "CCACHE_DIR=$ccache_dir"
            echo "CCACHE_BASEDIR=$workspace_dir"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_MAXSIZE=750M"
          } >> "$GITHUB_ENV"

          ccache --zero-stats

      - name: Verify MSYS2 toolchain
        run: |
          set -euo pipefail

          ${{ matrix.compiler_check }}
          meson --version
          pkg-config --modversion gtk+-3.0
          command -v glib-compile-schemas > /dev/null
          command -v gio-querymodules > /dev/null
          command -v gtk-query-immodules-3.0 > /dev/null
          command -v gdk-pixbuf-query-loaders > /dev/null
          command -v xlsxio_xlsx2csv > /dev/null

      - name: Detect runner build concurrency
        id: jobs
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Sync authoritative upstream core
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"

          [ -f tools/onARaspberry ] || {
            echo "Missing hydrated upstream helper at tools/onARaspberry after sync." >&2
            exit 1
          }

          chmod +x tools/onARaspberry

      - name: Load packaged Windows font into runner session
        shell: pwsh
        run: |
          $fontPath = Join-Path $PWD "res\fonts\C47__StandardFont.ttf"
          if (-not (Test-Path $fontPath)) {
            throw "Expected font file not found: $fontPath"
          }

          Add-Type -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;

          public static class C47FontLoader {
              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, EntryPoint = "AddFontResourceW", SetLastError = true)]
              public static extern int AddFontResource(string lpFileName);

              [DllImport("user32.dll", EntryPoint = "SendMessageW", SetLastError = true)]
              public static extern IntPtr SendMessage(IntPtr hWnd, uint Msg, IntPtr wParam, IntPtr lParam);
          }
          '@

          $fontsAdded = [C47FontLoader]::AddFontResource($fontPath)
          if ($fontsAdded -lt 1) {
            throw "AddFontResource failed for $fontPath"
          }

          [void][C47FontLoader]::SendMessage([IntPtr]0xffff, 0x001D, [IntPtr]::Zero, [IntPtr]::Zero)
          Write-Host "Loaded $fontsAdded font resource(s) from $fontPath"

      - name: Build upstream Windows package
        env:
          CC: ccache gcc
          CXX: ccache g++
          R47_SOURCE_REPOSITORY_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          R47_SOURCE_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          log_file="ci-artifacts/logs/build-windows-${{ matrix.artifact_suffix }}.log"
          mkdir -p "$(dirname "$log_file")"

          make \
            NINJAFLAGS="-j ${{ steps.jobs.outputs.jobs }}" \
            dist_windows 2>&1 | tee "$log_file"

      - name: Show compiler cache stats
        if: always()
        run: |
          set -euo pipefail
          ccache --show-stats

      - name: Bundle stripped runtime and name artifact
        id: bundle
        env:
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
          MSYSTEM_LABEL: ${{ matrix.msystem }}
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          XLSXIO_URL: ${{ steps.defaults.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.defaults.outputs.xlsxio_commit }}
        run: |
          set -euo pipefail

          log_file="ci-artifacts/logs/build-windows-${ARTIFACT_SUFFIX}.log"
          mkdir -p "$(dirname "$log_file")"

          bash ./scripts/windows/bundle_stripped_runtime.sh 2>&1 | tee -a "$log_file"

      - name: Upload Windows simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r47-windows-${{ matrix.artifact_suffix }}-${{ needs.resolve-upstream-core.outputs.upstream_short }}
          path: ${{ steps.bundle.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r47-windows-${{ matrix.artifact_suffix }}-${{ needs.resolve-upstream-core.outputs.upstream_short }}-build-log
          path: ci-artifacts/logs/build-windows-${{ matrix.artifact_suffix }}.log
          if-no-files-found: warn
          retention-days: 14
