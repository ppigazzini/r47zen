name: Windows CI

on:
  workflow_dispatch:
  schedule:
    - cron: '34 3 * * *'
  push:
    branches:
      - github_ci

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream core revision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      upstream_url: ${{ steps.resolve.outputs.upstream_url }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      upstream_short: ${{ steps.resolve.outputs.upstream_short }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Resolve latest upstream core
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          eval "$(bash ./scripts/upstream-sync/upstream.sh resolve --latest)"

          echo "upstream_url=$R47_RESOLVED_UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$R47_RESOLVED_UPSTREAM_COMMIT" >> "$GITHUB_OUTPUT"
          echo "upstream_short=$R47_RESOLVED_UPSTREAM_SHORT_COMMIT" >> "$GITHUB_OUTPUT"

  windows-simulator:
    name: Build Windows simulator (${{ matrix.label }})
    needs:
      - resolve-upstream-core
    runs-on: windows-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: UCRT64
            msystem: UCRT64
            package_prefix: mingw-w64-ucrt-x86_64
            compiler_check: gcc --version
            artifact_suffix: ucrt64
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Configure Git defaults
        shell: pwsh
        run: |
          git config --global core.autocrlf input
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Set up MSYS2 ${{ matrix.msystem }}
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          cache: true
          update: true
          path-type: minimal
          install: >-
            git
            make
            unzip
            zip
            ${{ matrix.package_prefix }}-ca-certificates
            ${{ matrix.package_prefix }}-cc
            ${{ matrix.package_prefix }}-freetype
            ${{ matrix.package_prefix }}-gmp
            ${{ matrix.package_prefix }}-gtk3
            ${{ matrix.package_prefix }}-meson
            ${{ matrix.package_prefix }}-ninja
            ${{ matrix.package_prefix }}-pkgconf
            ${{ matrix.package_prefix }}-xlsxio

      - name: Verify MSYS2 toolchain
        run: |
          set -euo pipefail

          ${{ matrix.compiler_check }}
          meson --version
          pkg-config --modversion gtk+-3.0
          command -v xlsxio_xlsx2csv > /dev/null

      - name: Detect runner build concurrency
        id: jobs
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Sync authoritative upstream core
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"

          [ -f tools/onARaspberry ] || {
            echo "Missing hydrated upstream helper at tools/onARaspberry after sync." >&2
            exit 1
          }

          chmod +x tools/onARaspberry

      - name: Load packaged Windows font into runner session
        shell: pwsh
        run: |
          $fontPath = Join-Path $PWD "res\fonts\C47__StandardFont.ttf"
          if (-not (Test-Path $fontPath)) {
            throw "Expected font file not found: $fontPath"
          }

          Add-Type -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;

          public static class C47FontLoader {
              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, EntryPoint = "AddFontResourceW", SetLastError = true)]
              public static extern int AddFontResource(string lpFileName);

              [DllImport("user32.dll", EntryPoint = "SendMessageW", SetLastError = true)]
              public static extern IntPtr SendMessage(IntPtr hWnd, uint Msg, IntPtr wParam, IntPtr lParam);
          }
          '@

          $fontsAdded = [C47FontLoader]::AddFontResource($fontPath)
          if ($fontsAdded -lt 1) {
            throw "AddFontResource failed for $fontPath"
          }

          [void][C47FontLoader]::SendMessage([IntPtr]0xffff, 0x001D, [IntPtr]::Zero, [IntPtr]::Zero)
          Write-Host "Loaded $fontsAdded font resource(s) from $fontPath"

      - name: Build upstream Windows package
        env:
          R47_SOURCE_REPOSITORY_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          R47_SOURCE_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          log_file="ci-artifacts/logs/build-windows-${{ matrix.artifact_suffix }}.log"
          mkdir -p "$(dirname "$log_file")"

          make \
            NINJAFLAGS="-j ${{ steps.jobs.outputs.jobs }}" \
            dist_windows 2>&1 | tee "$log_file"

      - name: Bundle stripped runtime and name artifact
        id: bundle
        env:
          UPSTREAM_SHORT: ${{ needs.resolve-upstream-core.outputs.upstream_short }}
        run: |
          set -euo pipefail

          log_file="ci-artifacts/logs/build-windows-${{ matrix.artifact_suffix }}.log"
          mkdir -p "$(dirname "$log_file")"

          {
          artifact_dir="artifact-${{ matrix.artifact_suffix }}"
          release_dir="$artifact_dir/release"
          package_dir="$release_dir/c47-windows"
          stripped_count=0

          rm -rf "$artifact_dir"
          mkdir -p "$release_dir"
          unzip -q c47-windows.zip -d "$release_dir"

          if command -v llvm-strip > /dev/null 2>&1; then
            strip_tool=llvm-strip
          elif command -v strip > /dev/null 2>&1; then
            strip_tool=strip
          else
            echo "No strip tool found in PATH." >&2
            exit 1
          fi

          "$strip_tool" "$package_dir/c47.exe" "$package_dir/r47.exe"
          stripped_count=2

          dlls=$(for exe in "$package_dir/c47.exe" "$package_dir/r47.exe"; do
            ldd "$exe"
          done | awk -v prefix="$MINGW_PREFIX/bin/" '
            $3 ~ ("^" prefix) && $3 ~ /\.dll$/ { print $3 }
            $1 ~ ("^" prefix) && $1 ~ /\.dll$/ { print $1 }
          ' | sort -u)

          if [[ -z "$dlls" ]]; then
            echo "Failed to resolve runtime DLLs from $MINGW_PREFIX/bin." >&2
            exit 1
          fi

          while IFS= read -r dll; do
            [[ -n "$dll" ]] || continue
            cp "$dll" "$package_dir"/
          done <<< "$dlls"

          printf 'Stripped executable sizes:\n'
          stat -c '%n %s' "$package_dir/c47.exe" "$package_dir/r47.exe"

          bash ./scripts/package-notices/generate_simulator_notice_artifacts.sh \
            --platform windows \
            --package-dir "$package_dir" \
            --upstream-source-repository-url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --upstream-source-commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            --xlsxio-source-repository-url "${{ steps.defaults.outputs.xlsxio_url }}" \
            --xlsxio-source-commit "${{ steps.defaults.outputs.xlsxio_commit }}"

          find "$package_dir" -type f | sed "s#^$release_dir/##" | sort > "$release_dir/PACKAGE-CONTENTS.txt"

          cat > "$release_dir/BUILD-METADATA.txt" <<EOF
          upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}
          upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          upstream_license_file=COPYING
          source_manifest_file=SOURCE
          xlsxio_url=${{ steps.defaults.outputs.xlsxio_url }}
          xlsxio_commit=${{ steps.defaults.outputs.xlsxio_commit }}
          xlsxio_license_file=LICENSE.txt
          make_target=dist_windows
          msystem=${{ matrix.msystem }}
          strip_tool=$strip_tool
          stripped_files_count=$stripped_count
          package_zip=c47-windows.zip
          package_dir=$(basename "$package_dir")
          third_party_inventory_file=THIRD-PARTY.spdx.json
          platform_notice_root=repo-notices/windows
          platform_notice_summary_file=repo-notices/windows/NOTICE-SUMMARY.txt
          gpl_notice_file=repo-notices/windows/gpl/COPYING.txt
          decnumbericu_notice_file=repo-notices/windows/decnumbericu/ICU-license.html
          xlsxio_notice_file=repo-notices/windows/xlsxio/LICENSE.txt
          windows_dll_inventory_file=repo-notices/windows/WINDOWS-RUNTIME-DLLS.txt
          windows_dll_notice_summary_file=repo-notices/windows/WINDOWS-DLL-NOTICES.txt
          windows_dll_notice_dir=repo-notices/windows/licenses
          EOF

          rm -f c47-windows.zip

          echo "artifact_path=$release_dir" >> "$GITHUB_OUTPUT"
          } 2>&1 | tee -a "$log_file"

      - name: Upload Windows simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: r47-windows-${{ matrix.artifact_suffix }}-${{ needs.resolve-upstream-core.outputs.upstream_short }}
          path: ${{ steps.bundle.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: r47-windows-${{ matrix.artifact_suffix }}-${{ needs.resolve-upstream-core.outputs.upstream_short }}-build-log
          path: ci-artifacts/logs/build-windows-${{ matrix.artifact_suffix }}.log
          if-no-files-found: warn
          retention-days: 14