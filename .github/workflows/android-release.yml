name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: Monotonic Android versionCode for the Play upload (YYYYMMDDVV)
        required: true
        type: string
      version_name:
        description: Android versionName and derived GitHub tag basis (major.minor.patch-signed.YYYYMMDDVV)
        required: true
        type: string

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-release-inputs:
    name: Resolve release version inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version_code: ${{ steps.resolve.outputs.version_code }}
      version_name: ${{ steps.resolve.outputs.version_name }}
      release_mode: ${{ steps.resolve.outputs.release_mode }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version inputs
        id: resolve
        shell: bash
        env:
          R47_VERSION_CODE_INPUT: ${{ inputs.version_code }}
          R47_VERSION_NAME_INPUT: ${{ inputs.version_name }}
        run: |
          set -euo pipefail

          version_code="$R47_VERSION_CODE_INPUT"
          version_name="$R47_VERSION_NAME_INPUT"
          release_mode="manual"

          case "$version_code" in
            ''|*[!0-9]*)
              echo "version_code must be a positive integer." >&2
              exit 1
              ;;
          esac

          if [[ "$version_code" -lt 1 ]]; then
            echo "version_code must be greater than zero." >&2
            exit 1
          fi

          if [[ -z "$version_name" ]]; then
            echo "version_name must be non-empty." >&2
            exit 1
          fi

          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "release_mode=$release_mode" >> "$GITHUB_OUTPUT"

  resolve-upstream-core:
    name: Resolve authoritative upstream core revision
    uses: ./.github/workflows/resolve-upstream-core.yml
    with:
      mode: locked

  build-production-release-bundle:
    name: Build signed production release assets
    if: github.ref == 'refs/heads/main'
    needs:
      - resolve-release-inputs
      - resolve-upstream-core
    environment: production-release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      apk_artifact_name: ${{ steps.meta.outputs.apk_artifact_name }}
      release_bundle_name: ${{ steps.meta.outputs.release_bundle_name }}
      release_apk_name: ${{ steps.meta.outputs.release_apk_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "application_id=$R47_DEFAULT_ANDROID_APPLICATION_ID" >> "$GITHUB_OUTPUT"
          echo "ndk_version=$R47_DEFAULT_ANDROID_NDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "cmake_version=$R47_DEFAULT_ANDROID_CMAKE_VERSION" >> "$GITHUB_OUTPUT"
          echo "compile_sdk=$R47_DEFAULT_ANDROID_COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "android_test_api_level=$R47_DEFAULT_ANDROID_TEST_API_LEVEL" >> "$GITHUB_OUTPUT"
          echo "build_tools_version=$R47_DEFAULT_ANDROID_BUILD_TOOLS_VERSION" >> "$GITHUB_OUTPUT"
          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-provider: basic

      - name: Select writable Android SDK root
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="$HOME/.android/sdk"
          mkdir -p "$sdk_root"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Accept Android SDK licenses non-interactively
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager_bin="$(command -v sdkmanager || true)"
          if [[ -z "$sdkmanager_bin" ]]; then
            sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
            for candidate in \
              "$sdk_root/cmdline-tools/latest/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/20.0/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/19.0/bin/sdkmanager"; do
              if [[ -x "$candidate" ]]; then
                sdkmanager_bin="$candidate"
                break
              fi
            done
          fi

          if [[ -z "$sdkmanager_bin" ]]; then
            echo "Unable to locate sdkmanager after setup-android." >&2
            exit 1
          fi

          set +o pipefail
          yes | "$sdkmanager_bin" --licenses > /dev/null
          set -o pipefail

      - name: Resolve Android SDK cache paths
        id: android-sdk
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          if [[ -z "$sdk_root" ]]; then
            echo "Failed to resolve Android SDK root." >&2
            exit 1
          fi

          echo "sdk_root=$sdk_root" >> "$GITHUB_OUTPUT"

      - name: Restore Android SDK packages cache
        id: android-sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.android-sdk.outputs.sdk_root }}/licenses
            ${{ steps.android-sdk.outputs.sdk_root }}/platform-tools
            ${{ steps.android-sdk.outputs.sdk_root }}/platforms/android-${{ steps.defaults.outputs.compile_sdk }}
            ${{ steps.android-sdk.outputs.sdk_root }}/build-tools/${{ steps.defaults.outputs.build_tools_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/cmake/${{ steps.defaults.outputs.cmake_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ steps.defaults.outputs.ndk_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/emulator
            ${{ steps.android-sdk.outputs.sdk_root }}/system-images/android-${{ steps.defaults.outputs.android_test_api_level }}/default/x86_64
          key: ${{ runner.os }}-android-sdk-${{ steps.defaults.outputs.compile_sdk }}-${{ steps.defaults.outputs.build_tools_version }}-${{ steps.defaults.outputs.cmake_version }}-${{ steps.defaults.outputs.ndk_version }}-${{ steps.defaults.outputs.android_test_api_level }}-default-x86_64-v1

      - name: Install Android SDK packages
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager \
            "platforms;android-${{ steps.defaults.outputs.compile_sdk }}" \
            "build-tools;${{ steps.defaults.outputs.build_tools_version }}" \
            "cmake;${{ steps.defaults.outputs.cmake_version }}" \
            "ndk;${{ steps.defaults.outputs.ndk_version }}" \
            "emulator" \
            "system-images;android-${{ steps.defaults.outputs.android_test_api_level }};default;x86_64"

      - name: Materialize release keystore
        id: release-keystore
        shell: bash
        env:
          R47_RELEASE_STORE_FILE_BASE64: ${{ secrets.R47_RELEASE_STORE_FILE_BASE64 }}
          R47_RELEASE_STORE_PASSWORD: ${{ secrets.R47_RELEASE_STORE_PASSWORD }}
          R47_RELEASE_KEY_ALIAS: ${{ secrets.R47_RELEASE_KEY_ALIAS }}
          R47_RELEASE_KEY_PASSWORD: ${{ secrets.R47_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for secret_name in \
            R47_RELEASE_STORE_FILE_BASE64 \
            R47_RELEASE_STORE_PASSWORD \
            R47_RELEASE_KEY_ALIAS \
            R47_RELEASE_KEY_PASSWORD
          do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required production-release environment secret: ${secret_name}" >&2
              exit 1
            fi
          done

          keystore_path="${RUNNER_TEMP}/r47-release-upload-key.jks"
          printf '%s' "$R47_RELEASE_STORE_FILE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Install matching host LLVM profiling runtime
        shell: bash
        run: |
          set -euo pipefail

          ndk_root="${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ steps.defaults.outputs.ndk_version }}"
          clang_bin="$ndk_root/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          llvm_major="$($clang_bin --version | sed -nE '1s/.*clang version ([0-9]+).*/\1/p')"

          if [[ -z "$llvm_major" ]]; then
            echo "Failed to determine LLVM major version from $clang_bin" >&2
            exit 1
          fi

          sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)" ./llvm.sh "$llvm_major"
          sudo apt-get install --yes --no-install-recommends \
            "clang-${llvm_major}" \
            "clang-tools-${llvm_major}" \
            "lld-${llvm_major}" \
            "libclang-rt-${llvm_major}-dev"

          llvm_bindir="$(llvm-config-"$llvm_major" --bindir)"
          echo "$llvm_bindir" >> "$GITHUB_PATH"

      - name: Make scripts executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/android/build_android.sh

      - name: Set up xlsxio toolchain
        uses: ./.github/actions/setup-xlsxio-toolchain
        with:
          url: ${{ steps.defaults.outputs.xlsxio_url }}
          commit: ${{ steps.defaults.outputs.xlsxio_commit }}
          prefix: ${{ steps.defaults.outputs.xlsxio_prefix }}
          jobs: ${{ steps.jobs.outputs.jobs }}

      - name: Sync authoritative upstream core
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"
          echo "upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}" >> "$GITHUB_OUTPUT"

      - name: Set release metadata
        id: meta
        shell: bash
        env:
          R47_VERSION_NAME_INPUT: ${{ needs.resolve-release-inputs.outputs.version_name }}
        run: |
          set -euo pipefail

          eval "$(bash ./scripts/android/resolve_android_artifact_metadata.sh \
            --upstream-commit "${{ steps.upstream.outputs.upstream_commit }}" \
            --android-commit "${{ github.sha }}")"

          release_version_token=$(printf '%s' "$R47_VERSION_NAME_INPUT" | sed -e 's/[^0-9A-Za-z._-]/-/g' -e 's/^-*//' -e 's/-*$//')
          release_version_token="${release_version_token#[Vv]}"
          if [[ -z "$release_version_token" ]]; then
            echo "version_name did not contain any characters suitable for a GitHub release tag." >&2
            exit 1
          fi

          echo "artifact_name=$R47_ANDROID_RELEASE_ARTIFACT_STEM" >> "$GITHUB_OUTPUT"
          echo "apk_artifact_name=${R47_ANDROID_RELEASE_ARTIFACT_STEM}-apk" >> "$GITHUB_OUTPUT"
          echo "release_bundle_name=$R47_ANDROID_RELEASE_AAB_NAME" >> "$GITHUB_OUTPUT"
          echo "release_apk_name=$R47_ANDROID_RELEASE_APK_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=r47zen-v${release_version_token}" >> "$GITHUB_OUTPUT"
          echo "release_title=R47 Zen ${R47_VERSION_NAME_INPUT}" >> "$GITHUB_OUTPUT"

      - name: Prepare staged native inputs and simulator parity
        shell: bash
        env:
          R47_RELEASE_STORE_FILE: ${{ steps.release-keystore.outputs.keystore_path }}
          R47_RELEASE_STORE_PASSWORD: ${{ secrets.R47_RELEASE_STORE_PASSWORD }}
          R47_RELEASE_KEY_ALIAS: ${{ secrets.R47_RELEASE_KEY_ALIAS }}
          R47_RELEASE_KEY_PASSWORD: ${{ secrets.R47_RELEASE_KEY_PASSWORD }}
          R47_NDK_VERSION: ${{ steps.defaults.outputs.ndk_version }}
          R47_BUILD_JOBS: ${{ steps.jobs.outputs.jobs }}
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.jobs.outputs.jobs }}
          R47_GRADLE_ARGS: '--no-daemon --stacktrace --console=plain'
          R47_PGO_OUTPUT_DIR: ${{ github.workspace }}/ci-artifacts/pgo
          R47_SOURCE_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          R47_SOURCE_COMMIT: ${{ github.sha }}
          R47_UPSTREAM_SOURCE_REPOSITORY_URL: ${{ steps.upstream.outputs.upstream_url }}
          R47_UPSTREAM_SOURCE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
          R47_XLSXIO_URL: ${{ steps.defaults.outputs.xlsxio_url }}
          R47_XLSXIO_COMMIT: ${{ steps.defaults.outputs.xlsxio_commit }}
          GRADLE_OPTS: -Dorg.gradle.workers.max=${{ steps.jobs.outputs.jobs }}
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/logs
          ./scripts/android/build_android.sh \
            --run-sim-tests \
            --collect-host-pgo \
            --validate-release-pgo \
            2>&1 | tee ci-artifacts/logs/build-android-release.log

      - name: Build Android release verification artifacts and run JVM tests
        shell: bash
        env:
          R47_VERSION_CODE_INPUT: ${{ inputs.version_code }}
          R47_VERSION_NAME_INPUT: ${{ inputs.version_name }}
          R47_RELEASE_STORE_FILE: ${{ steps.release-keystore.outputs.keystore_path }}
          R47_RELEASE_STORE_PASSWORD: ${{ secrets.R47_RELEASE_STORE_PASSWORD }}
          R47_RELEASE_KEY_ALIAS: ${{ secrets.R47_RELEASE_KEY_ALIAS }}
          R47_RELEASE_KEY_PASSWORD: ${{ secrets.R47_RELEASE_KEY_PASSWORD }}
          GRADLE_OPTS: -Dorg.gradle.workers.max=${{ steps.jobs.outputs.jobs }}
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/logs

          cd android
          ./gradlew --max-workers "${{ steps.jobs.outputs.jobs }}" \
            lint \
            :app:assembleRelease \
            :app:assembleReleaseAndroidTest \
            :app:testReleaseUnitTest \
            --no-daemon --stacktrace --console=plain --warning-mode all \
            -Pr47.releaseMinify=false \
            -Pr47.releaseShrinkResources=false \
            -Pr47.ndkVersion=${{ steps.defaults.outputs.ndk_version }} \
            -Pr47.testBuildType=release \
            -Pr47.versionCode="$R47_VERSION_CODE_INPUT" \
            -Pr47.versionName="$R47_VERSION_NAME_INPUT" \
            -Pr47.coreVersion=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.sourceRepositoryUrl=${{ github.server_url }}/${{ github.repository }} \
            -Pr47.sourceCommit=${{ github.sha }} \
            -Pr47.upstreamSourceRepositoryUrl=${{ steps.upstream.outputs.upstream_url }} \
            -Pr47.upstreamSourceCommit=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.xlsxioSourceRepositoryUrl=${{ steps.defaults.outputs.xlsxio_url }} \
            -Pr47.xlsxioSourceCommit=${{ steps.defaults.outputs.xlsxio_commit }} \
            2>&1 | tee ../ci-artifacts/logs/android-release-verification.log

      - name: Restore Android emulator AVD cache
        id: avd-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-android-avd-${{ steps.defaults.outputs.android_test_api_level }}-default-x86_64-pixel_7-v1

      - name: Enable KVM access for Android emulator
        shell: bash
        run: |
          set -euo pipefail

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Android emulator snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ steps.defaults.outputs.android_test_api_level }}
          target: default
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-boot-timeout: 900
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          working-directory: ./android
          script: echo "Generated Android emulator snapshot."

      - name: Run Android release instrumentation tests on emulator
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        env:
          R47_CONNECTED_ANDROID_TEST_JOBS: ${{ steps.jobs.outputs.jobs }}
          R47_CONNECTED_ANDROID_TEST_NDK_VERSION: ${{ steps.defaults.outputs.ndk_version }}
          R47_CONNECTED_ANDROID_TEST_ABI_FILTERS: arm64-v8a,x86_64
          R47_CONNECTED_ANDROID_TEST_RELEASE_CHANNEL: prod
          R47_CONNECTED_ANDROID_TEST_BUILD_TYPE: release
          R47_CONNECTED_ANDROID_TEST_RELEASE_MINIFY: 'false'
          R47_CONNECTED_ANDROID_TEST_RELEASE_SHRINK_RESOURCES: 'false'
          R47_CONNECTED_ANDROID_ENABLE_CONFIGURATION_CACHE: 'true'
          R47_CONNECTED_ANDROID_FIXTURE_TIMEOUT: 3m
          R47_CONNECTED_ANDROID_FIXTURE_KILL_AFTER: 20s
          R47_CONNECTED_ANDROID_USE_DAEMON: 'true'
          R47_RELEASE_STORE_FILE: ${{ steps.release-keystore.outputs.keystore_path }}
          R47_RELEASE_STORE_PASSWORD: ${{ secrets.R47_RELEASE_STORE_PASSWORD }}
          R47_RELEASE_KEY_ALIAS: ${{ secrets.R47_RELEASE_KEY_ALIAS }}
          R47_RELEASE_KEY_PASSWORD: ${{ secrets.R47_RELEASE_KEY_PASSWORD }}
          R47_CONNECTED_ANDROID_TEST_CORE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
          R47_CONNECTED_ANDROID_TEST_SOURCE_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          R47_CONNECTED_ANDROID_TEST_SOURCE_COMMIT: ${{ github.sha }}
          R47_CONNECTED_ANDROID_TEST_UPSTREAM_SOURCE_REPOSITORY_URL: ${{ steps.upstream.outputs.upstream_url }}
          R47_CONNECTED_ANDROID_TEST_UPSTREAM_SOURCE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
          R47_CONNECTED_ANDROID_TEST_XLSXIO_SOURCE_REPOSITORY_URL: ${{ steps.defaults.outputs.xlsxio_url }}
          R47_CONNECTED_ANDROID_TEST_XLSXIO_SOURCE_COMMIT: ${{ steps.defaults.outputs.xlsxio_commit }}
        with:
          api-level: ${{ steps.defaults.outputs.android_test_api_level }}
          target: default
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          working-directory: ./android
          script: >-
            bash --noprofile --norc ../scripts/android/run_connected_android_tests.sh

      - name: Build signed release APK and bundle
        shell: bash
        env:
          R47_RELEASE_STORE_FILE: ${{ steps.release-keystore.outputs.keystore_path }}
          R47_RELEASE_STORE_PASSWORD: ${{ secrets.R47_RELEASE_STORE_PASSWORD }}
          R47_RELEASE_KEY_ALIAS: ${{ secrets.R47_RELEASE_KEY_ALIAS }}
          R47_RELEASE_KEY_PASSWORD: ${{ secrets.R47_RELEASE_KEY_PASSWORD }}
          R47_RELEASE_HOST_PGO_PROFILE: ${{ github.workspace }}/ci-artifacts/pgo/r47-host-core.profdata
          R47_VERSION_CODE_INPUT: ${{ needs.resolve-release-inputs.outputs.version_code }}
          R47_VERSION_NAME_INPUT: ${{ needs.resolve-release-inputs.outputs.version_name }}
          GRADLE_OPTS: -Dorg.gradle.workers.max=${{ steps.jobs.outputs.jobs }}
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/logs

          cd android
          ./gradlew --max-workers "${{ steps.jobs.outputs.jobs }}" \
            :app:assembleRelease \
            :app:bundleRelease \
            --no-daemon --stacktrace --console=plain --warning-mode all \
            -Pr47.ndkVersion=${{ steps.defaults.outputs.ndk_version }} \
            -Pr47.pgoProfilePath="$R47_RELEASE_HOST_PGO_PROFILE" \
            -Pr47.versionCode="$R47_VERSION_CODE_INPUT" \
            -Pr47.versionName="$R47_VERSION_NAME_INPUT" \
            -Pr47.coreVersion=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.sourceRepositoryUrl=${{ github.server_url }}/${{ github.repository }} \
            -Pr47.sourceCommit=${{ github.sha }} \
            -Pr47.upstreamSourceRepositoryUrl=${{ steps.upstream.outputs.upstream_url }} \
            -Pr47.upstreamSourceCommit=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.xlsxioSourceRepositoryUrl=${{ steps.defaults.outputs.xlsxio_url }} \
            -Pr47.xlsxioSourceCommit=${{ steps.defaults.outputs.xlsxio_commit }} \
            2>&1 | tee ../ci-artifacts/logs/android-release-bundle.log

      - name: Collect release packaging evidence
        shell: bash
        env:
          R47_VERSION_CODE_INPUT: ${{ needs.resolve-release-inputs.outputs.version_code }}
          R47_VERSION_NAME_INPUT: ${{ needs.resolve-release-inputs.outputs.version_name }}
        run: |
          set -euo pipefail

          bundle_output_dir='ci-artifacts/release-aab'
          apk_output_dir='ci-artifacts/release-apk'
          bundle_path='android/app/build/outputs/bundle/release/app-release.aab'
          release_apk_path='android/app/build/outputs/apk/release/app-release.apk'
          mapping_path='android/app/build/outputs/mapping/release/mapping.txt'
          native_symbols_dir='android/app/build/intermediates/native_debug_metadata/release/extractReleaseNativeDebugMetadata/out'
          native_symbols_path="$PWD/ci-artifacts/native-debug-symbols.zip"

          if [[ ! -f "$bundle_path" ]]; then
            echo "Missing release bundle at ${bundle_path}." >&2
            exit 1
          fi
          if [[ ! -f "$release_apk_path" ]]; then
            echo "Missing release APK at ${release_apk_path}." >&2
            exit 1
          fi
          if [[ ! -f "$mapping_path" ]]; then
            echo "Missing release mapping file at ${mapping_path}." >&2
            exit 1
          fi
          if [[ ! -d "$native_symbols_dir" ]]; then
            echo "Missing native debug metadata directory at ${native_symbols_dir}." >&2
            exit 1
          fi

          mkdir -p ci-artifacts "$bundle_output_dir" "$apk_output_dir"
          rm -f "$native_symbols_path"
          (
            cd "$native_symbols_dir"
            zip -qr "$native_symbols_path" .
          )

          bash ./scripts/android/collect_packaging_evidence.sh \
            --variant release \
            --bundle "$bundle_path" \
            --output-dir "$bundle_output_dir" \
            --artifact-name "${{ steps.meta.outputs.release_bundle_name }}" \
            --expected-abis arm64-v8a \
            --android-sdk-root "${ANDROID_SDK_ROOT:?}" \
            --ndk-version "${{ steps.defaults.outputs.ndk_version }}" \
            --compile-sdk "${{ steps.defaults.outputs.compile_sdk }}" \
            --cmake-version "${{ steps.defaults.outputs.cmake_version }}" \
            --android-source-repository-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --android-source-commit "${GITHUB_SHA}" \
            --upstream-source-repository-url "${{ steps.upstream.outputs.upstream_url }}" \
            --upstream-source-commit "${{ steps.upstream.outputs.upstream_commit }}" \
            --xlsxio-source-repository-url "${{ steps.defaults.outputs.xlsxio_url }}" \
            --xlsxio-source-commit "${{ steps.defaults.outputs.xlsxio_commit }}" \
            --application-id "${{ steps.defaults.outputs.application_id }}" \
            --version-code "$R47_VERSION_CODE_INPUT" \
            --version-name "$R47_VERSION_NAME_INPUT" \
            --signing-mode release \
            --ref "${GITHUB_REF}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --mapping-file "$mapping_path" \
            --native-symbols "$native_symbols_path"

          bash ./scripts/android/collect_packaging_evidence.sh \
            --variant release \
            --apk "$release_apk_path" \
            --output-dir "$apk_output_dir" \
            --artifact-name "${{ steps.meta.outputs.release_apk_name }}" \
            --expected-abis arm64-v8a \
            --android-sdk-root "${ANDROID_SDK_ROOT:?}" \
            --ndk-version "${{ steps.defaults.outputs.ndk_version }}" \
            --compile-sdk "${{ steps.defaults.outputs.compile_sdk }}" \
            --cmake-version "${{ steps.defaults.outputs.cmake_version }}" \
            --android-source-repository-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --android-source-commit "${GITHUB_SHA}" \
            --upstream-source-repository-url "${{ steps.upstream.outputs.upstream_url }}" \
            --upstream-source-commit "${{ steps.upstream.outputs.upstream_commit }}" \
            --xlsxio-source-repository-url "${{ steps.defaults.outputs.xlsxio_url }}" \
            --xlsxio-source-commit "${{ steps.defaults.outputs.xlsxio_commit }}" \
            --application-id "${{ steps.defaults.outputs.application_id }}" \
            --version-code "$R47_VERSION_CODE_INPUT" \
            --version-name "$R47_VERSION_NAME_INPUT" \
            --signing-mode release \
            --ref "${GITHUB_REF}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --mapping-file "$mapping_path" \
            --native-symbols "$native_symbols_path"

      - name: Upload release build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}-logs
          path: |
            ci-artifacts/logs/
            android/app/build/reports/tests
            android/app/build/test-results
            android/app/build/reports/androidTests
            android/app/build/outputs/androidTest-results
          if-no-files-found: warn
          retention-days: 30

      - name: Upload host-core PGO artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}-host-core-pgo
          path: |
            ci-artifacts/pgo/
            ci-artifacts/logs/build-android-release.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload signed release AAB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ci-artifacts/release-aab/
          if-no-files-found: error
          retention-days: 30

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.apk_artifact_name }}
          path: ci-artifacts/release-apk/
          if-no-files-found: error
          retention-days: 30

  publish-production-release:
    name: Publish production GitHub release
    if: github.ref == 'refs/heads/main'
    needs:
      - resolve-release-inputs
      - build-production-release-bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release AAB artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-production-release-bundle.outputs.artifact_name }}
          path: release-aab

      - name: Download release APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-production-release-bundle.outputs.apk_artifact_name }}
          path: release-apk

      - name: Pack release evidence archives
        id: evidence
        shell: bash
        run: |
          set -euo pipefail

          aab_name=$(sed -n 's/^artifact_name=//p' release-aab/BUILD-METADATA.txt)
          apk_name=$(sed -n 's/^artifact_name=//p' release-apk/BUILD-METADATA.txt)

          if [[ -z "$aab_name" || -z "$apk_name" ]]; then
            echo "Release build metadata did not contain both artifact names." >&2
            exit 1
          fi

          aab_evidence_archive_name="${aab_name%.aab}-packaging-evidence.zip"
          apk_evidence_archive_name="${apk_name%.apk}-packaging-evidence.zip"

          rm -f "release-aab/${aab_evidence_archive_name}" "release-apk/${apk_evidence_archive_name}"
          (
            cd release-aab
            zip -qr "$aab_evidence_archive_name" \
              BUILD-METADATA.txt \
              PACKAGED-COMPLIANCE-ASSETS.txt \
              SHA256SUMS.txt \
              mapping.txt \
              native-debug-symbols.zip \
              compliance-assets
          )
          (
            cd release-apk
            zip -qr "$apk_evidence_archive_name" \
              BUILD-METADATA.txt \
              PACKAGED-COMPLIANCE-ASSETS.txt \
              SHA256SUMS.txt \
              abis.txt \
              zipalign.txt \
              elf-load-segments.txt \
              mapping.txt \
              native-debug-symbols.zip \
              compliance-assets
          )

          echo "aab_evidence_archive_name=${aab_evidence_archive_name}" >> "$GITHUB_OUTPUT"
          echo "apk_evidence_archive_name=${apk_evidence_archive_name}" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        env:
          R47_RELEASE_MODE: ${{ needs.resolve-release-inputs.outputs.release_mode }}
        run: |
          set -euo pipefail

          upstream_commit=$(sed -n 's/^upstream_commit=//p' release-aab/BUILD-METADATA.txt)
          upstream_url=$(sed -n 's/^upstream_url=//p' release-aab/BUILD-METADATA.txt)
          android_commit=$(sed -n 's/^android_source_commit=//p' release-aab/BUILD-METADATA.txt)
          version_name=$(sed -n 's/^version_name=//p' release-aab/BUILD-METADATA.txt)
          version_code=$(sed -n 's/^version_code=//p' release-aab/BUILD-METADATA.txt)
          xlsxio_commit=$(sed -n 's/^xlsxio_commit=//p' release-aab/BUILD-METADATA.txt)
          xlsxio_url=$(sed -n 's/^xlsxio_url=//p' release-aab/BUILD-METADATA.txt)
          aab_name=$(sed -n 's/^artifact_name=//p' release-aab/BUILD-METADATA.txt)
          apk_name=$(sed -n 's/^artifact_name=//p' release-apk/BUILD-METADATA.txt)
          upstream_short_commit="${upstream_commit:0:8}"
          android_short_commit="${android_commit:0:8}"

          cat > release-notes.md <<EOF
          - Release tag ${{ needs.build-production-release-bundle.outputs.release_tag }}
          - Android version ${version_name} (${version_code})
          - Sync to commit [${upstream_short_commit}](${upstream_url}/-/commit/${upstream_commit})
          - Build Android overlay commit [${android_short_commit}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${android_commit})

          This release contains the signed production APK ${apk_name} for direct
          installation and the signed production AAB ${aab_name} for Play
          Console upload.

          The protected release workflow rebuilt the authoritative upstream core,
          reran the wrapper-owned host-core optimization flow, Android lint,
          release-path JVM tests, and release-path instrumentation tests before
          publishing these assets.

          The Linux host toolchain built xlsxio_xlsx2csv from ${xlsxio_url} at
          commit ${xlsxio_commit} to satisfy the upstream font-generation
          contract.

          Included assets:
          - ${apk_name}
          - ${aab_name}
          - ${{ steps.evidence.outputs.apk_evidence_archive_name }}
          - ${{ steps.evidence.outputs.aab_evidence_archive_name }}

          Notes:
          - This GitHub release was published from the ${R47_RELEASE_MODE} signed
            release lane.
          - The APK is the GitHub-distributed installable artifact for direct
            sideload updates.
          - The AAB is the Play Console upload artifact.
          - If Google Play later distributes builds signed by a different
            Play-held app-signing key, switching from this GitHub APK channel to
            Play delivery can still require reinstall.
          - The evidence archives preserve compliance assets, source provenance,
            signing metadata, and release packaging reports.

          Workflow run:
          https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

      - name: Create and publish production release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.build-production-release-bundle.outputs.release_tag }}
          name: ${{ needs.build-production-release-bundle.outputs.release_title }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: |
            release-apk/*.apk
            release-aab/*.aab
            release-apk/${{ steps.evidence.outputs.apk_evidence_archive_name }}
            release-aab/${{ steps.evidence.outputs.aab_evidence_archive_name }}
          fail_on_unmatched_files: true
          overwrite_files: true
          prerelease: false
          draft: false
          make_latest: true
