name: Android CI

on:
  workflow_dispatch:
    inputs:
      dev_version_code:
        description: Monotonic Android versionCode for the signed dev prerelease lane
        required: false
        type: string
      dev_version_name:
        description: Android versionName base for the signed dev prerelease lane
        required: false
        type: string
      upstream_commit:
        description: Optional upstream commit SHA to pin for this run (roadblock; blank = latest HEAD)
        required: false
        type: string
  push:
    branches:
      - github_ci
      - main
  pull_request:
  schedule:
    - cron: '14 3 * * *'

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
  R47_CI_GRADLE_ARGS: --daemon --stacktrace --console=plain
  R47_CI_GRADLE_WARNING_ARGS: --daemon --stacktrace --console=plain --warning-mode all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream core revision
    uses: ./.github/workflows/resolve-upstream-core.yml
    with:
      # Normal runs follow the latest upstream HEAD. A manual dispatch may pin an
      # explicit commit (roadblock); push/schedule leave the input blank.
      mode: latest
      upstream_commit: ${{ inputs.upstream_commit }}

  upstream-release-gate:
    name: Decide whether the release lane should run
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      release_tag: ${{ steps.decide.outputs.release_tag }}
      dev_version_code: ${{ steps.decide.outputs.dev_version_code }}
      dev_version_name: ${{ steps.decide.outputs.dev_version_name }}
      dev_build_token: ${{ steps.decide.outputs.dev_build_token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Decide whether to build and publish
        id: decide
        shell: bash
        env:
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          ANDROID_COMMIT: ${{ github.sha }}
          DEV_VERSION_CODE_INPUT: ${{ github.event.inputs.dev_version_code }}
          DEV_VERSION_NAME_INPUT: ${{ github.event.inputs.dev_version_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ -z "$UPSTREAM_COMMIT" ]]; then
            echo "Missing resolved upstream commit." >&2
            exit 1
          fi
          if [[ -z "$ANDROID_COMMIT" ]]; then
            echo "Missing Android repository commit." >&2
            exit 1
          fi

          eval "$(bash ./scripts/android/resolve_android_artifact_metadata.sh \
            --upstream-commit "$UPSTREAM_COMMIT" \
            --android-commit "$ANDROID_COMMIT")"

          release_tag="$R47_ANDROID_RELEASE_TAG"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

          dev_build_token="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${DEV_VERSION_CODE_INPUT:-}" ]]; then
            dev_version_code="$DEV_VERSION_CODE_INPUT"
          else
            dev_version_code="$GITHUB_RUN_NUMBER"
          fi

          if [[ "$dev_version_code" =~ [^0-9] || "$dev_version_code" -lt 1 ]]; then
            echo "Dev prerelease version code must be a positive integer. Got: $dev_version_code" >&2
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${DEV_VERSION_NAME_INPUT:-}" ]]; then
            dev_version_name="$DEV_VERSION_NAME_INPUT"
          else
            dev_version_name="0.1.0"
          fi

          if [[ -z "$dev_version_name" ]]; then
            echo "Dev prerelease version name must be non-empty." >&2
            exit 1
          fi

          echo "dev_version_code=$dev_version_code" >> "$GITHUB_OUTPUT"
          echo "dev_version_name=$dev_version_name" >> "$GITHUB_OUTPUT"
          echo "dev_build_token=$dev_build_token" >> "$GITHUB_OUTPUT"

          # release_tag is keyed on the resolved upstream short commit and the
          # Android overlay short commit. When neither has changed since the last
          # publish the prerelease already exists, so a scheduled run has nothing
          # new to build or test and we skip the heavy lanes. A push or a manual
          # dispatch always proceeds: a push moves ANDROID_COMMIT (new tag), and a
          # maintainer dispatch is an explicit rebuild request.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Manual dispatch: building regardless of existing $release_tag." >&2
            should_run=true
          elif gh release view "$release_tag" \
            --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $release_tag already exists: no new upstream or overlay" >&2
            echo "commit since the last publish. Skipping the build/test/publish" >&2
            echo "lanes." >&2
            should_run=false
          else
            echo "No release $release_tag yet: building a new artifact." >&2
            should_run=true
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

          # Surface a newly detected upstream commit so a scheduled build is a
          # visible drift event, not a silent rebuild. The skip gate above means
          # a scheduled run only reaches should_run=true when a new upstream (or
          # overlay) commit produced a fresh release_tag.
          if [[ "$should_run" == "true" && "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            {
              echo "### Nightly upstream drift detected"
              echo ""
              echo "A new upstream core commit produced a fresh release tag, so the nightly lane is building and testing it."
              echo ""
              echo "- upstream commit: \`$UPSTREAM_COMMIT\`"
              echo "- release tag: \`$release_tag\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  upstream-simulator-sanity:
    name: Sanity-check authoritative upstream simulator core
    if: needs.upstream-release-gate.outputs.should_run == 'true'
    needs:
      - resolve-upstream-core
      - upstream-release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            wget \
            zip

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up xlsxio toolchain
        uses: ./.github/actions/setup-xlsxio-toolchain
        with:
          url: ${{ steps.defaults.outputs.xlsxio_url }}
          commit: ${{ steps.defaults.outputs.xlsxio_commit }}
          prefix: ${{ steps.defaults.outputs.xlsxio_prefix }}
          jobs: ${{ steps.jobs.outputs.jobs }}

      - name: Sync authoritative upstream core
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"

      - name: Run upstream simulator sanity suite
        shell: bash
        run: |
          set -euo pipefail
          make \
            NINJAFLAGS="-j ${{ steps.jobs.outputs.jobs }}" \
            test

  python-contracts:
    name: Run maintained Python contract suite
    if: needs.upstream-release-gate.outputs.should_run == 'true'
    needs:
      - resolve-upstream-core
      - upstream-release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Sync authoritative upstream core
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Run Python contract suite
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/r47_contracts/run_contract_suite.sh

  android-build-test-package:
    name: Build, test, and package Android signed dev prerelease APK
    if: needs.upstream-release-gate.outputs.should_run == 'true'
    needs:
      - resolve-upstream-core
      - upstream-release-gate
      - python-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 75
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "ndk_version=$R47_DEFAULT_ANDROID_NDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "cmake_version=$R47_DEFAULT_ANDROID_CMAKE_VERSION" >> "$GITHUB_OUTPUT"
          echo "compile_sdk=$R47_DEFAULT_ANDROID_COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools_version=$R47_DEFAULT_ANDROID_BUILD_TOOLS_VERSION" >> "$GITHUB_OUTPUT"
          echo "abi_filters=$R47_DEFAULT_ANDROID_ABI_FILTERS" >> "$GITHUB_OUTPUT"
          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "android_test_api_level=$R47_DEFAULT_ANDROID_TEST_API_LEVEL" >> "$GITHUB_OUTPUT"
          echo "android_test_abi_filters=$R47_DEFAULT_ANDROID_TEST_ABI_FILTERS" >> "$GITHUB_OUTPUT"

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/github_ci' }}

      - name: Select writable Android SDK root
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="$HOME/.android/sdk"
          mkdir -p "$sdk_root"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Accept Android SDK licenses non-interactively
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager_bin="$(command -v sdkmanager || true)"
          if [[ -z "$sdkmanager_bin" ]]; then
            sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
            for candidate in \
              "$sdk_root/cmdline-tools/latest/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/20.0/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/19.0/bin/sdkmanager"; do
              if [[ -x "$candidate" ]]; then
                sdkmanager_bin="$candidate"
                break
              fi
            done
          fi

          if [[ -z "$sdkmanager_bin" ]]; then
            echo "Unable to locate sdkmanager after setup-android." >&2
            exit 1
          fi

          set +o pipefail
          yes | "$sdkmanager_bin" --licenses > /dev/null
          set -o pipefail

      - name: Resolve Android SDK cache paths
        id: android-sdk
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          if [[ -z "$sdk_root" ]]; then
            echo "Failed to resolve Android SDK root." >&2
            exit 1
          fi

          echo "sdk_root=$sdk_root" >> "$GITHUB_OUTPUT"

      - name: Restore Android SDK packages cache
        id: android-sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.android-sdk.outputs.sdk_root }}/licenses
            ${{ steps.android-sdk.outputs.sdk_root }}/platform-tools
            ${{ steps.android-sdk.outputs.sdk_root }}/platforms/android-${{ steps.defaults.outputs.compile_sdk }}
            ${{ steps.android-sdk.outputs.sdk_root }}/build-tools/${{ steps.defaults.outputs.build_tools_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/cmake/${{ steps.defaults.outputs.cmake_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ steps.defaults.outputs.ndk_version }}
          key: ${{ runner.os }}-android-sdk-${{ steps.defaults.outputs.compile_sdk }}-${{ steps.defaults.outputs.build_tools_version }}-${{ steps.defaults.outputs.cmake_version }}-${{ steps.defaults.outputs.ndk_version }}-v1

      - name: Install Android SDK packages
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager \
            "platforms;android-${{ steps.defaults.outputs.compile_sdk }}" \
            "build-tools;${{ steps.defaults.outputs.build_tools_version }}" \
            "cmake;${{ steps.defaults.outputs.cmake_version }}" \
            "ndk;${{ steps.defaults.outputs.ndk_version }}"

      - name: Install matching host LLVM profiling runtime
        shell: bash
        run: |
          set -euo pipefail

          ndk_root="${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ steps.defaults.outputs.ndk_version }}"
          clang_bin="$ndk_root/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          llvm_major="$($clang_bin --version | sed -nE '1s/.*clang version ([0-9]+).*/\1/p')"

          if [[ -z "$llvm_major" ]]; then
            echo "Failed to determine LLVM major version from $clang_bin" >&2
            exit 1
          fi

          sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)" ./llvm.sh "$llvm_major"
          sudo apt-get install --yes --no-install-recommends \
            "clang-${llvm_major}" \
            "clang-tools-${llvm_major}" \
            "lld-${llvm_major}" \
            "libclang-rt-${llvm_major}-dev"

          llvm_bindir="$(llvm-config-"$llvm_major" --bindir)"
          echo "$llvm_bindir" >> "$GITHUB_PATH"

      - name: Set up xlsxio toolchain
        uses: ./.github/actions/setup-xlsxio-toolchain
        with:
          url: ${{ steps.defaults.outputs.xlsxio_url }}
          commit: ${{ steps.defaults.outputs.xlsxio_commit }}
          prefix: ${{ steps.defaults.outputs.xlsxio_prefix }}
          jobs: ${{ steps.jobs.outputs.jobs }}

      - name: Sync authoritative upstream core
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"
          echo "upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit="${{ steps.upstream.outputs.upstream_commit }}"
          android_commit="${{ github.sha }}"
          if [[ -z "$upstream_commit" ]]; then
            echo "Missing synchronized upstream commit metadata." >&2
            exit 1
          fi
          if [[ -z "$android_commit" ]]; then
            echo "Missing Android repository commit metadata." >&2
            exit 1
          fi

          eval "$(bash ./scripts/android/resolve_android_artifact_metadata.sh \
            --upstream-commit "$upstream_commit" \
            --android-commit "$android_commit")"

          echo "artifact_name=$R47_ANDROID_ARTIFACT_STEM" >> "$GITHUB_OUTPUT"
          echo "dev_apk_name=$R47_ANDROID_DEV_APK_NAME" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "release_tag=$R47_ANDROID_DEV_RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "release_title=$R47_ANDROID_DEV_RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate prerelease signing inputs
        shell: bash
        env:
          R47_PRERELEASE_STORE_FILE_BASE64: ${{ secrets.R47_PRERELEASE_STORE_FILE_BASE64 }}
          R47_PRERELEASE_STORE_PASSWORD: ${{ secrets.R47_PRERELEASE_STORE_PASSWORD }}
          R47_PRERELEASE_KEY_ALIAS: ${{ secrets.R47_PRERELEASE_KEY_ALIAS }}
          R47_PRERELEASE_KEY_PASSWORD: ${{ secrets.R47_PRERELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            R47_PRERELEASE_STORE_FILE_BASE64
            R47_PRERELEASE_STORE_PASSWORD
            R47_PRERELEASE_KEY_ALIAS
            R47_PRERELEASE_KEY_PASSWORD
          )

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required prerelease secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Build, test, and package Android signed dev prerelease APK
        shell: bash
        env:
          R47_NDK_VERSION: ${{ steps.defaults.outputs.ndk_version }}
          R47_BUILD_JOBS: ${{ steps.jobs.outputs.jobs }}
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.jobs.outputs.jobs }}
          R47_GRADLE_ARGS: ${{ env.R47_CI_GRADLE_ARGS }}
          R47_PGO_OUTPUT_DIR: ${{ github.workspace }}/ci-artifacts/pgo
          R47_SOURCE_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          R47_SOURCE_COMMIT: ${{ github.sha }}
          R47_UPSTREAM_SOURCE_REPOSITORY_URL: ${{ steps.upstream.outputs.upstream_url }}
          R47_UPSTREAM_SOURCE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
          R47_XLSXIO_URL: ${{ steps.defaults.outputs.xlsxio_url }}
          R47_XLSXIO_COMMIT: ${{ steps.defaults.outputs.xlsxio_commit }}
          R47_RELEASE_CHANNEL: dev
          R47_RELEASE_CHANNEL_BUILD_TOKEN: ${{ needs.upstream-release-gate.outputs.dev_build_token }}
          R47_VERSION_CODE: ${{ needs.upstream-release-gate.outputs.dev_version_code }}
          R47_VERSION_NAME: ${{ needs.upstream-release-gate.outputs.dev_version_name }}
          R47_PRERELEASE_STORE_FILE: ${{ github.workspace }}/ci-signing/prerelease.keystore
          R47_PRERELEASE_STORE_PASSWORD: ${{ secrets.R47_PRERELEASE_STORE_PASSWORD }}
          R47_PRERELEASE_KEY_ALIAS: ${{ secrets.R47_PRERELEASE_KEY_ALIAS }}
          R47_PRERELEASE_KEY_PASSWORD: ${{ secrets.R47_PRERELEASE_KEY_PASSWORD }}
          GRADLE_OPTS: '-Dorg.gradle.workers.max=${{ steps.jobs.outputs.jobs }}'
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/logs
          mkdir -p ci-signing
          printf '%s' '${{ secrets.R47_PRERELEASE_STORE_FILE_BASE64 }}' | base64 --decode > "$R47_PRERELEASE_STORE_FILE"

          ./scripts/android/build_android.sh \
            --run-sim-tests \
            --collect-host-pgo \
            --validate-release-pgo \
            2>&1 | tee ci-artifacts/logs/build-android.log

      - name: Run Android lint
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs

          cd android
          ./gradlew --max-workers "${{ steps.jobs.outputs.jobs }}" \
            lint \
            ${{ env.R47_CI_GRADLE_WARNING_ARGS }} \
            -Pr47.ndkVersion=${{ steps.defaults.outputs.ndk_version }} \
            -Pr47.coreVersion=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.sourceRepositoryUrl=${{ github.server_url }}/${{ github.repository }} \
            -Pr47.sourceCommit=${{ github.sha }} \
            -Pr47.upstreamSourceRepositoryUrl=${{ steps.upstream.outputs.upstream_url }} \
            -Pr47.upstreamSourceCommit=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.xlsxioSourceRepositoryUrl=${{ steps.defaults.outputs.xlsxio_url }} \
            -Pr47.xlsxioSourceCommit=${{ steps.defaults.outputs.xlsxio_commit }} \
            2>&1 | tee ../ci-artifacts/logs/android-lint.log

      - name: Verify Android staging stays build-only
        shell: bash
        run: |
          set -euo pipefail

          legacy_paths=(
            android/app/src/main/cpp/c47
            android/app/src/main/cpp/decNumberICU
            android/app/src/main/cpp/generated
            android/app/src/main/cpp/gmp
            android/app/src/main/cpp/STAGED-SOURCE-MANIFEST.txt
            android/app/src/main/cpp/staged_native_sources.cmake
          )
          present_legacy_paths=()

          if [[ ! -f android/.staged-native/cpp/staged_native_sources.cmake || ! -f android/.staged-native/cpp/STAGED-SOURCE-MANIFEST.txt ]]; then
            echo "Android build did not generate the build-only native staging metadata under android/.staged-native/cpp/." >&2
            exit 1
          fi

          for path in "${legacy_paths[@]}"; do
            if [[ -e "$path" ]]; then
              present_legacy_paths+=("$path")
            fi
          done

          if [[ ${#present_legacy_paths[@]} -gt 0 ]]; then
            echo "Retired Android native snapshot paths are present after build:" >&2
            printf '  %s\n' "${present_legacy_paths[@]}" >&2
            echo "Build-only staged outputs must stay under android/.staged-native/cpp/, while the retired app-module snapshot paths remain absent." >&2
            exit 1
          fi

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}-build-log
          path: ci-artifacts/logs/build-android.log
          if-no-files-found: warn
          retention-days: 14

      - name: Collect packaging evidence
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/android/collect_packaging_evidence.sh \
            --variant release \
            --apk android/app/build/outputs/apk/release/app-release.apk \
            --output-dir ci-artifacts/release \
            --artifact-name "${{ steps.meta.outputs.dev_apk_name }}" \
            --expected-abis "${{ steps.defaults.outputs.abi_filters }}" \
            --android-sdk-root "${ANDROID_SDK_ROOT:?}" \
            --ndk-version "${{ steps.defaults.outputs.ndk_version }}" \
            --compile-sdk "${{ steps.defaults.outputs.compile_sdk }}" \
            --cmake-version "${{ steps.defaults.outputs.cmake_version }}" \
            --android-source-repository-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --android-source-commit "${GITHUB_SHA}" \
            --upstream-source-repository-url "${{ steps.upstream.outputs.upstream_url }}" \
            --upstream-source-commit "${{ steps.upstream.outputs.upstream_commit }}" \
            --xlsxio-source-repository-url "${{ steps.defaults.outputs.xlsxio_url }}" \
            --xlsxio-source-commit "${{ steps.defaults.outputs.xlsxio_commit }}" \
            --version-code "${{ needs.upstream-release-gate.outputs.dev_version_code }}" \
            --version-name "${{ needs.upstream-release-gate.outputs.dev_version_name }}" \
            --signing-mode prerelease \
            --ref "${GITHUB_REF}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Upload Android build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ci-artifacts/release/
          if-no-files-found: error
          retention-days: 14

      - name: Upload host-core PGO artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}-host-core-pgo
          path: |
            ci-artifacts/pgo/
            ci-artifacts/logs/build-android.log
          if-no-files-found: warn
          retention-days: 14

  android-tests:
    name: Run Android JVM and instrumentation tests
    if: needs.upstream-release-gate.outputs.should_run == 'true'
    needs:
      - resolve-upstream-core
      - upstream-release-gate
      - python-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "ndk_version=$R47_DEFAULT_ANDROID_NDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "cmake_version=$R47_DEFAULT_ANDROID_CMAKE_VERSION" >> "$GITHUB_OUTPUT"
          echo "compile_sdk=$R47_DEFAULT_ANDROID_COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools_version=$R47_DEFAULT_ANDROID_BUILD_TOOLS_VERSION" >> "$GITHUB_OUTPUT"
          echo "abi_filters=$R47_DEFAULT_ANDROID_ABI_FILTERS" >> "$GITHUB_OUTPUT"
          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "android_test_api_level=$R47_DEFAULT_ANDROID_TEST_API_LEVEL" >> "$GITHUB_OUTPUT"
          echo "android_test_abi_filters=$R47_DEFAULT_ANDROID_TEST_ABI_FILTERS" >> "$GITHUB_OUTPUT"

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/github_ci' }}

      - name: Select writable Android SDK root
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="$HOME/.android/sdk"
          mkdir -p "$sdk_root"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Accept Android SDK licenses non-interactively
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager_bin="$(command -v sdkmanager || true)"
          if [[ -z "$sdkmanager_bin" ]]; then
            sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
            for candidate in \
              "$sdk_root/cmdline-tools/latest/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/20.0/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/19.0/bin/sdkmanager"; do
              if [[ -x "$candidate" ]]; then
                sdkmanager_bin="$candidate"
                break
              fi
            done
          fi

          if [[ -z "$sdkmanager_bin" ]]; then
            echo "Unable to locate sdkmanager after setup-android." >&2
            exit 1
          fi

          set +o pipefail
          yes | "$sdkmanager_bin" --licenses > /dev/null
          set -o pipefail

      - name: Resolve Android SDK cache paths
        id: android-sdk
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          if [[ -z "$sdk_root" ]]; then
            echo "Failed to resolve Android SDK root." >&2
            exit 1
          fi

          echo "sdk_root=$sdk_root" >> "$GITHUB_OUTPUT"

      - name: Restore Android SDK packages cache
        id: android-sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.android-sdk.outputs.sdk_root }}/licenses
            ${{ steps.android-sdk.outputs.sdk_root }}/platform-tools
            ${{ steps.android-sdk.outputs.sdk_root }}/platforms/android-${{ steps.defaults.outputs.compile_sdk }}
            ${{ steps.android-sdk.outputs.sdk_root }}/build-tools/${{ steps.defaults.outputs.build_tools_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/cmake/${{ steps.defaults.outputs.cmake_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/ndk/${{ steps.defaults.outputs.ndk_version }}
            ${{ steps.android-sdk.outputs.sdk_root }}/emulator
            ${{ steps.android-sdk.outputs.sdk_root }}/system-images/android-${{ steps.defaults.outputs.android_test_api_level }}/default/x86_64
          key: ${{ runner.os }}-android-sdk-${{ steps.defaults.outputs.compile_sdk }}-${{ steps.defaults.outputs.build_tools_version }}-${{ steps.defaults.outputs.cmake_version }}-${{ steps.defaults.outputs.ndk_version }}-${{ steps.defaults.outputs.android_test_api_level }}-default-x86_64-v2

      - name: Install Android SDK packages
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager \
            "platforms;android-${{ steps.defaults.outputs.compile_sdk }}" \
            "build-tools;${{ steps.defaults.outputs.build_tools_version }}" \
            "cmake;${{ steps.defaults.outputs.cmake_version }}" \
            "ndk;${{ steps.defaults.outputs.ndk_version }}" \
            "emulator" \
            "system-images;android-${{ steps.defaults.outputs.android_test_api_level }};default;x86_64"

      - name: Validate prerelease signing inputs
        shell: bash
        env:
          R47_PRERELEASE_STORE_FILE_BASE64: ${{ secrets.R47_PRERELEASE_STORE_FILE_BASE64 }}
          R47_PRERELEASE_STORE_PASSWORD: ${{ secrets.R47_PRERELEASE_STORE_PASSWORD }}
          R47_PRERELEASE_KEY_ALIAS: ${{ secrets.R47_PRERELEASE_KEY_ALIAS }}
          R47_PRERELEASE_KEY_PASSWORD: ${{ secrets.R47_PRERELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            R47_PRERELEASE_STORE_FILE_BASE64
            R47_PRERELEASE_STORE_PASSWORD
            R47_PRERELEASE_KEY_ALIAS
            R47_PRERELEASE_KEY_PASSWORD
          )

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required prerelease secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Prepare prerelease keystore for connected tests
        shell: bash
        env:
          R47_PRERELEASE_STORE_FILE_BASE64: ${{ secrets.R47_PRERELEASE_STORE_FILE_BASE64 }}
          R47_PRERELEASE_STORE_PASSWORD: ${{ secrets.R47_PRERELEASE_STORE_PASSWORD }}
          R47_PRERELEASE_KEY_ALIAS: ${{ secrets.R47_PRERELEASE_KEY_ALIAS }}
          R47_PRERELEASE_KEY_PASSWORD: ${{ secrets.R47_PRERELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p ci-signing
          printf '%s' "$R47_PRERELEASE_STORE_FILE_BASE64" | base64 --decode > ci-signing/prerelease.keystore

      - name: Make scripts executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/android/build_android.sh

      - name: Set up xlsxio toolchain
        uses: ./.github/actions/setup-xlsxio-toolchain
        with:
          url: ${{ steps.defaults.outputs.xlsxio_url }}
          commit: ${{ steps.defaults.outputs.xlsxio_commit }}
          prefix: ${{ steps.defaults.outputs.xlsxio_prefix }}
          jobs: ${{ steps.jobs.outputs.jobs }}

      - name: Sync authoritative upstream core
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"
          echo "upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}" >> "$GITHUB_OUTPUT"

      - name: Set Android test metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit="${{ steps.upstream.outputs.upstream_commit }}"
          android_commit="${{ github.sha }}"
          if [[ -z "$upstream_commit" ]]; then
            echo "Missing synchronized upstream commit metadata." >&2
            exit 1
          fi
          if [[ -z "$android_commit" ]]; then
            echo "Missing Android repository commit metadata." >&2
            exit 1
          fi

          eval "$(bash ./scripts/android/resolve_android_artifact_metadata.sh \
            --upstream-commit "$upstream_commit" \
            --android-commit "$android_commit")"

          echo "artifact_name=$R47_ANDROID_TEST_ARTIFACT_STEM" >> "$GITHUB_OUTPUT"

      - name: Build Android dev-release artifacts and run JVM tests
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs

          core_version="${{ steps.upstream.outputs.upstream_commit }}"
          core_version="${core_version:0:8}"

          cd android
          ./gradlew --max-workers "${{ steps.jobs.outputs.jobs }}" \
            :app:assembleRelease \
            :app:assembleReleaseAndroidTest \
            :app:testReleaseUnitTest \
            :app:koverXmlReportRelease \
            :app:koverHtmlReportRelease \
            :app:koverLogRelease \
            ${{ env.R47_CI_GRADLE_ARGS }} \
            -Pr47.releaseMinify=false \
            -Pr47.releaseShrinkResources=false \
            -Pr47.ndkVersion=${{ steps.defaults.outputs.ndk_version }} \
            -Pr47.abiFilters=${{ steps.defaults.outputs.android_test_abi_filters }} \
            -Pr47.coreVersion="$core_version" \
            -Pr47.releaseChannel=dev \
            -Pr47.testBuildType=release \
            -Pr47.releaseChannelBuildToken=${{ needs.upstream-release-gate.outputs.dev_build_token }} \
            -Pr47.sourceRepositoryUrl=${{ github.server_url }}/${{ github.repository }} \
            -Pr47.sourceCommit=${{ github.sha }} \
            -Pr47.upstreamSourceRepositoryUrl=${{ steps.upstream.outputs.upstream_url }} \
            -Pr47.upstreamSourceCommit=${{ steps.upstream.outputs.upstream_commit }} \
            -Pr47.xlsxioSourceRepositoryUrl=${{ steps.defaults.outputs.xlsxio_url }} \
            -Pr47.xlsxioSourceCommit=${{ steps.defaults.outputs.xlsxio_commit }} \
            2>&1 | tee ../ci-artifacts/logs/android-dev-release-build-and-unit.log

      - name: Enforce JVM unit-test coverage gate
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/android/coverage_gate.sh \
            2>&1 | tee ci-artifacts/logs/android-coverage-gate.log

      - name: Restore Android emulator AVD cache
        id: avd-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-android-avd-${{ steps.defaults.outputs.android_test_api_level }}-default-x86_64-pixel_7-v1

      - name: Enable KVM access for Android emulator
        shell: bash
        run: |
          set -euo pipefail

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Android emulator snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ steps.defaults.outputs.android_test_api_level }}
          target: default
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-boot-timeout: 900
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          working-directory: ./android
          script: echo "Generated Android emulator snapshot."

      - name: Run Android instrumentation tests on emulator
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        env:
          R47_CONNECTED_ANDROID_TEST_JOBS: ${{ steps.jobs.outputs.jobs }}
          R47_CONNECTED_ANDROID_TEST_NDK_VERSION: ${{ steps.defaults.outputs.ndk_version }}
          R47_CONNECTED_ANDROID_TEST_ABI_FILTERS: ${{ steps.defaults.outputs.android_test_abi_filters }}
          R47_CONNECTED_ANDROID_TEST_RELEASE_CHANNEL: dev
          R47_CONNECTED_ANDROID_TEST_BUILD_TYPE: release
          R47_CONNECTED_ANDROID_TEST_RELEASE_MINIFY: 'false'
          R47_CONNECTED_ANDROID_TEST_RELEASE_SHRINK_RESOURCES: 'false'
          R47_CONNECTED_ANDROID_ENABLE_CONFIGURATION_CACHE: 'true'
          R47_CONNECTED_ANDROID_USE_DAEMON: 'true'
          R47_PRERELEASE_STORE_FILE: ${{ github.workspace }}/ci-signing/prerelease.keystore
          R47_PRERELEASE_STORE_PASSWORD: ${{ secrets.R47_PRERELEASE_STORE_PASSWORD }}
          R47_PRERELEASE_KEY_ALIAS: ${{ secrets.R47_PRERELEASE_KEY_ALIAS }}
          R47_PRERELEASE_KEY_PASSWORD: ${{ secrets.R47_PRERELEASE_KEY_PASSWORD }}
          R47_CONNECTED_ANDROID_TEST_CORE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
          R47_CONNECTED_ANDROID_TEST_SOURCE_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          R47_CONNECTED_ANDROID_TEST_SOURCE_COMMIT: ${{ github.sha }}
          R47_CONNECTED_ANDROID_TEST_UPSTREAM_SOURCE_REPOSITORY_URL: ${{ steps.upstream.outputs.upstream_url }}
          R47_CONNECTED_ANDROID_TEST_UPSTREAM_SOURCE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
          R47_CONNECTED_ANDROID_TEST_XLSXIO_SOURCE_REPOSITORY_URL: ${{ steps.defaults.outputs.xlsxio_url }}
          R47_CONNECTED_ANDROID_TEST_XLSXIO_SOURCE_COMMIT: ${{ steps.defaults.outputs.xlsxio_commit }}
        with:
          api-level: ${{ steps.defaults.outputs.android_test_api_level }}
          target: default
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          working-directory: ./android
          script: >-
            bash --noprofile --norc ../scripts/android/run_connected_android_tests.sh

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ci-artifacts/logs
            android/app/build/reports/tests
            android/app/build/test-results
            android/app/build/reports/androidTests
            android/app/build/outputs/androidTest-results
            android/app/build/reports/kover
          if-no-files-found: warn
          retention-days: 14

  publish-main-snapshot:
    name: Publish signed dev prerelease
    if: |
      needs.upstream-release-gate.outputs.should_run == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - upstream-release-gate
      - upstream-simulator-sanity
      - android-build-test-package
      - android-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download Android build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.android-build-test-package.outputs.artifact_name }}
          path: release-assets

      - name: Pack packaging evidence archive
        id: evidence
        shell: bash
        run: |
          set -euo pipefail

          dev_apk_name=$(sed -n 's/^artifact_name=//p' release-assets/BUILD-METADATA.txt)
          if [[ -z "$dev_apk_name" ]]; then
            echo "BUILD-METADATA.txt did not contain artifact_name." >&2
            exit 1
          fi
          evidence_archive_name="${dev_apk_name%.apk}-packaging-evidence.zip"

          rm -f "release-assets/${evidence_archive_name}"
          (
            cd release-assets
            zip -qr "$evidence_archive_name" \
              BUILD-METADATA.txt \
              PACKAGED-COMPLIANCE-ASSETS.txt \
              SHA256SUMS.txt \
              abis.txt \
              zipalign.txt \
              elf-load-segments.txt \
              compliance-assets
          )

              echo "evidence_archive_name=${evidence_archive_name}" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit=$(sed -n 's/^upstream_commit=//p' release-assets/BUILD-METADATA.txt)
          upstream_url=$(sed -n 's/^upstream_url=//p' release-assets/BUILD-METADATA.txt)
          android_commit=$(sed -n 's/^android_source_commit=//p' release-assets/BUILD-METADATA.txt)
          xlsxio_commit=$(sed -n 's/^xlsxio_commit=//p' release-assets/BUILD-METADATA.txt)
          xlsxio_url=$(sed -n 's/^xlsxio_url=//p' release-assets/BUILD-METADATA.txt)
          dev_apk_name=$(sed -n 's/^artifact_name=//p' release-assets/BUILD-METADATA.txt)
          release_tag="${{ needs.android-build-test-package.outputs.release_tag }}"
          if [[ -z "$dev_apk_name" ]]; then
            echo "BUILD-METADATA.txt did not contain artifact_name." >&2
            exit 1
          fi
          upstream_short_commit="${upstream_commit:0:8}"
          android_short_commit="${android_commit:0:8}"
          evidence_archive_name="${dev_apk_name%.apk}-packaging-evidence.zip"

          cat > release-notes.md <<EOF
          - Snapshot tag ${release_tag}
          - Sync to commit [${upstream_short_commit}](${upstream_url}/-/commit/${upstream_commit})
          - Build Android overlay commit [${android_short_commit}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${android_commit})

          This prerelease contains the signed dev-channel APK ${dev_apk_name}
          built from the release variant by ./scripts/android/build_android.sh
          in dev lane mode from Android repository
          commit ${android_commit}.

          The calculator core was synchronized from ${upstream_url} at commit
          ${upstream_commit} before the simulator and Android build steps ran.

          The Linux host toolchain built xlsxio_xlsx2csv from ${xlsxio_url} at
          commit ${xlsxio_commit} to satisfy the upstream font-generation
          contract.

          Included assets:
          - ${dev_apk_name}
          - ${evidence_archive_name}

          Notes:
          - This is a signed prerelease lane that is separate from the
            production release key and from the manual production release
            workflow.
          - The workflow first sanity-checked the authoritative upstream
            simulator core with parallel make test.
          - The Android lane rebuilt assets, reran the simulator-native suite
            from ./scripts/android/build_android.sh --run-sim-tests, and then
            packaged the signed dev-channel APK.
          - The workflow verified packaged ABIs and ran the Android 16 KB zip
            alignment check described in the Android docs.
          - ${evidence_archive_name} preserves the compliance-assets/ directory,
            BUILD-METADATA.txt, SHA256SUMS.txt, ABI/alignment reports, and the
            packaged notice inventory exactly as collected by
            android/collect_packaging_evidence.sh.

          Workflow run:
          https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

      - name: Create and publish prerelease
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.android-build-test-package.outputs.release_tag }}
          name: ${{ needs.android-build-test-package.outputs.release_title }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: |
            release-assets/${{ steps.evidence.outputs.evidence_archive_name }}
            release-assets/*.apk
          fail_on_unmatched_files: true
          overwrite_files: true
          prerelease: true
          draft: false
          make_latest: false
