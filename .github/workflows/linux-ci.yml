name: Linux CI

on:
  workflow_dispatch:
  schedule:
    - cron: '24 3 * * *'
  push:
    branches:
      - github_ci
  pull_request:

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream core revision
    uses: ./.github/workflows/resolve-upstream-core.yml
    with:
      mode: latest

  upstream-resolver-policy:
    name: Verify upstream resolver policy contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run resolver-policy test harness
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/upstream-sync/test_resolver_policy.sh

  linux-simulator:
    name: Build Linux simulator package
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: bash ./scripts/android/install_linux_build_deps.sh ccache xvfb

      - name: Restore compiler cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/ccache-linux
          key: ${{ runner.os }}-linux-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-linux-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-linux-ccache-

      - name: Configure compiler cache
        shell: bash
        run: |
          set -euo pipefail

          ccache_dir="${RUNNER_TEMP}/ccache-linux"
          mkdir -p "$ccache_dir"

          {
            echo "CCACHE_DIR=$ccache_dir"
            echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_MAXSIZE=750M"
          } >> "$GITHUB_ENV"

          ccache --zero-stats

      - name: Set up xlsxio toolchain
        uses: ./.github/actions/setup-xlsxio-toolchain
        with:
          url: ${{ steps.defaults.outputs.xlsxio_url }}
          commit: ${{ steps.defaults.outputs.xlsxio_commit }}
          prefix: ${{ steps.defaults.outputs.xlsxio_prefix }}
          jobs: ${{ steps.jobs.outputs.jobs }}

      - name: Sync authoritative upstream core
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"
          echo "upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}" >> "$GITHUB_OUTPUT"

      - name: Set artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit="${{ steps.upstream.outputs.upstream_commit }}"
          if [[ -z "$upstream_commit" ]]; then
            echo "Missing synchronized upstream commit metadata." >&2
            exit 1
          fi

          upstream_short_commit="${upstream_commit:0:12}"
          artifact_name="r47-linux-${upstream_short_commit}"

          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build Linux simulator package
        shell: bash
        env:
          CC: ccache gcc
          CXX: ccache g++
          R47_SOURCE_REPOSITORY_URL: ${{ steps.upstream.outputs.upstream_url }}
          R47_SOURCE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs
          make \
            NINJAFLAGS="-j ${{ steps.jobs.outputs.jobs }}" \
            XVFB=xvfb-run \
            dist_linux 2>&1 | tee ci-artifacts/logs/build-linux.log

      - name: Show compiler cache stats
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ccache --show-stats

      - name: Upload Linux build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}-build-log
          path: ci-artifacts/logs/build-linux.log
          if-no-files-found: warn
          retention-days: 14

      - name: Collect Linux package artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="$PWD/ci-artifacts"
          release_dir="$artifact_dir/release"
          package_zip="c47-linux.zip"
          package_dir="$release_dir/c47-linux"
          stripped_count=0

          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          if [[ ! -f "$package_zip" ]]; then
            echo "Missing Linux package zip: $package_zip" >&2
            exit 1
          fi

          unzip -q "$package_zip" -d "$release_dir"

          if [[ ! -d "$package_dir" ]]; then
            echo "Missing extracted Linux package directory: $package_dir" >&2
            exit 1
          fi

          if command -v llvm-strip > /dev/null 2>&1; then
            strip_tool=llvm-strip
          elif command -v strip > /dev/null 2>&1; then
            strip_tool=strip
          else
            echo "No strip tool found in PATH." >&2
            exit 1
          fi

          while IFS= read -r -d '' binary; do
            if ! readelf -h "$binary" > /dev/null 2>&1; then
              continue
            fi

            "$strip_tool" "$binary"
            stripped_count=$((stripped_count + 1))
          done < <(find "$package_dir" -type f -print0)

          bash ./scripts/package-notices/generate_simulator_notice_artifacts.sh \
            --platform linux \
            --package-dir "$package_dir" \
            --upstream-source-repository-url "${{ steps.upstream.outputs.upstream_url }}" \
            --upstream-source-commit "${{ steps.upstream.outputs.upstream_commit }}" \
            --xlsxio-source-repository-url "${{ steps.defaults.outputs.xlsxio_url }}" \
            --xlsxio-source-commit "${{ steps.defaults.outputs.xlsxio_commit }}"

          find "$package_dir" -type f | sed "s#^$release_dir/##" | sort > "$release_dir/PACKAGE-CONTENTS.txt"

          cat > "$release_dir/BUILD-METADATA.txt" <<EOF
          upstream_url=${{ steps.upstream.outputs.upstream_url }}
          upstream_commit=${{ steps.upstream.outputs.upstream_commit }}
          upstream_license_file=COPYING
          source_manifest_file=SOURCE
          xlsxio_url=${{ steps.defaults.outputs.xlsxio_url }}
          xlsxio_commit=${{ steps.defaults.outputs.xlsxio_commit }}
          xlsxio_license_file=LICENSE.txt
          make_target=dist_linux
          strip_tool=$strip_tool
          stripped_files_count=$stripped_count
          package_zip=$package_zip
          package_dir=$(basename "$package_dir")
          third_party_inventory_file=THIRD-PARTY.spdx.json
          platform_notice_root=repo-notices/linux
          platform_notice_summary_file=repo-notices/linux/NOTICE-SUMMARY.txt
          gpl_notice_file=repo-notices/linux/gpl/COPYING.txt
          decnumbericu_notice_file=repo-notices/linux/decnumbericu/ICU-license.html
          mini_gmp_notice_file=repo-notices/linux/mini-gmp/NOTICE.txt
          xlsxio_notice_file=repo-notices/linux/xlsxio/LICENSE.txt
          linux_runtime_library_inventory_file=repo-notices/linux/LINUX-RUNTIME-LIBRARIES.txt
          linux_runtime_notice_summary_file=repo-notices/linux/LINUX-LIBRARY-NOTICES.txt
          linux_runtime_notice_dir=repo-notices/linux/licenses
          EOF

          if [[ -f "$package_dir/repo-notices/linux/jimtcl/LICENSE.txt" ]]; then
            jimtcl_url=$(sed -n 's/^jimtcl_url=//p' "$package_dir/SOURCE")
            jimtcl_commit=$(sed -n 's/^jimtcl_commit=//p' "$package_dir/SOURCE")
            if [[ -n "$jimtcl_url" ]]; then
              echo "jimtcl_url=$jimtcl_url" >> "$release_dir/BUILD-METADATA.txt"
            fi
            if [[ -n "$jimtcl_commit" ]]; then
              echo "jimtcl_commit=$jimtcl_commit" >> "$release_dir/BUILD-METADATA.txt"
            fi
            echo "jimtcl_notice_file=repo-notices/linux/jimtcl/LICENSE.txt" >> "$release_dir/BUILD-METADATA.txt"
          fi

      - name: Upload Linux simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ci-artifacts/release/
          if-no-files-found: error
          retention-days: 14

  host-workload-regressions:
    name: Run host workload runtime regressions
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run host CI contracts
        shell: bash
        run: |
          set -euo pipefail

          # Runs every pure-host workflow contract (NDK resolution, ABI single
          # -source, published-artifact verifier, production-signing scope,
          # release provenance, privileged-remote-script, LLVM toolchain install,
          # build-deps single-source) plus the ci_contract.sh meta-test, each in
          # its own log group. The lcd HAL contract stays a separate step below.
          bash ./scripts/android/run_workflow_contracts.sh

      - name: Load shared Android defaults
        id: defaults
        shell: bash
        run: |
          set -euo pipefail

          . ./android/r47-defaults.properties

          echo "xlsxio_url=$R47_DEFAULT_XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$R47_DEFAULT_XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: bash ./scripts/android/install_linux_build_deps.sh

      - name: Set up xlsxio toolchain
        uses: ./.github/actions/setup-xlsxio-toolchain
        with:
          url: ${{ steps.defaults.outputs.xlsxio_url }}
          commit: ${{ steps.defaults.outputs.xlsxio_commit }}
          prefix: ${{ steps.defaults.outputs.xlsxio_prefix }}
          jobs: ${{ steps.jobs.outputs.jobs }}

      - name: Sync authoritative upstream core
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/upstream-sync/upstream.sh sync --auto --write-lock \
            --url "${{ needs.resolve-upstream-core.outputs.upstream_url }}" \
            --commit "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          bash ./scripts/upstream-sync/hydrate_submodules.sh \
            "${{ needs.resolve-upstream-core.outputs.upstream_commit }}" \
            "${{ needs.resolve-upstream-core.outputs.upstream_url }}"

      - name: Run host workload runtime regressions
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs
          bash ./scripts/workload-regressions/run_workload_regressions.sh 2>&1 \
            | tee ci-artifacts/logs/host-workload-regressions.log

      - name: Run sanitized host workload runtime regressions
        shell: bash
        run: |
          set -euo pipefail

          # Reruns the same workload corpus over the staged core and Android
          # bridge built under AddressSanitizer (the hard gate: a memory error
          # fails the lane) and UndefinedBehaviorSanitizer (recoverable report
          # mode: upstream-owned core UB surfaces for triage without failing the
          # lane). No emulator. Slower than the plain lane because the sanitized
          # core builds without optimization, so it carries a wider per-fixture
          # budget. Reuses the staged native inputs the plain step produced.
          mkdir -p ci-artifacts/logs
          bash ./scripts/workload-regressions/run_workload_regressions_sanitized.sh 2>&1 \
            | tee ci-artifacts/logs/host-workload-regressions-sanitized.log

      - name: Run bridge ThreadSanitizer harness
        shell: bash
        run: |
          set -euo pipefail

          # Races the live input/refresh producer path against the UI read path
          # with the staged core and Android bridge built under ThreadSanitizer,
          # the one concurrency surface the single-threaded ASan/UBSan lanes do
          # not exercise. A data race or lock-order inversion in the
          # Android-owned bridge is the hard gate and aborts the run; upstream
          # -core races (none today) are deferred to the scoped suppression file.
          # No emulator. Reuses the staged native inputs the workload step
          # produced. Slower than the plain lane because the core is rebuilt
          # under the sanitizer.
          mkdir -p ci-artifacts/logs
          bash ./scripts/workload-regressions/build_bridge_tsan_harness.sh 2>&1 \
            | tee ci-artifacts/logs/bridge-tsan-harness.log

      - name: Run lcd HAL contract test
        shell: bash
        run: |
          set -euo pipefail

          # Asserts two hal/lcd.c invariants: a screen refresh bumps
          # keypadSnapshotGeneration (the signal the display loop uses to re-read
          # dynamic softkeys such as the EQN editor), and init_lcd_buffers leaves
          # the unused screenData compatibility framebuffer NULL (no dead 384 KB).
          # Reuses the staged native inputs the workload step just produced. No
          # emulator required.
          bash ./scripts/android/run_keypad_generation_contract.sh 2>&1 \
            | tee ci-artifacts/logs/keypad-generation-contract.log

      - name: Upload host workload regression log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r47-host-workload-regressions-${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          path: |
            ci-artifacts/logs/host-workload-regressions.log
            ci-artifacts/logs/host-workload-regressions-sanitized.log
            ci-artifacts/logs/bridge-tsan-harness.log
          if-no-files-found: warn
          retention-days: 14
