name: Toolchain install smoke

# Dedicated, path-filtered smoke for the host build-toolchain installers. The
# static contracts assert these scripts are wired correctly; this job actually
# runs the apt + apt.llvm.org installs on a clean runner and checks the tools
# resolve -- the class of failure (missing package, broken repo, unavailable LLVM
# major) that twice reached a protected workflow. It is intentionally a separate
# workflow so it is not a required check by default (non-blocking), and runs only
# when the installers change.

on:
  push:
    branches:
      - github_ci
      - main
    paths:
      - scripts/android/install_linux_build_deps.sh
      - scripts/android/install_host_llvm_toolchain.sh
      - scripts/android/smoke_host_toolchain.sh
      - .github/workflows/toolchain-smoke.yml
  pull_request:
    paths:
      - scripts/android/install_linux_build_deps.sh
      - scripts/android/install_host_llvm_toolchain.sh
      - scripts/android/smoke_host_toolchain.sh
      - .github/workflows/toolchain-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  toolchain-smoke:
    name: Host toolchain install smoke
    runs-on: ubuntu-latest
    # The apt + apt.llvm.org installs can hang on a broken mirror; bound the job
    # instead of inheriting the 360-minute default.
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run host toolchain install smoke
        shell: bash
        run: bash ./scripts/android/smoke_host_toolchain.sh
