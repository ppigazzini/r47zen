name: Resolve upstream core

# Reusable workflow that resolves one authoritative upstream core revision and
# exposes it as outputs. Called by the Android, Linux, and Windows CI workflows
# and by the protected release workflow so the resolution job is defined once.

on:
  workflow_call:
    inputs:
      mode:
        description: 'Resolution mode passed to upstream.sh resolve: latest or locked.'
        type: string
        required: false
        default: latest
      upstream_commit:
        description: 'Optional explicit upstream commit SHA (roadblock pin). When set, resolution locks to this commit and mode is ignored.'
        type: string
        required: false
        default: ''
    outputs:
      upstream_url:
        description: 'Resolved upstream repository URL.'
        value: ${{ jobs.resolve.outputs.upstream_url }}
      upstream_commit:
        description: 'Resolved upstream commit SHA.'
        value: ${{ jobs.resolve.outputs.upstream_commit }}
      upstream_short:
        description: 'Short form of the resolved upstream commit SHA.'
        value: ${{ jobs.resolve.outputs.upstream_short }}

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve authoritative upstream core revision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      upstream_url: ${{ steps.resolve.outputs.upstream_url }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      upstream_short: ${{ steps.resolve.outputs.upstream_short }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Verify upstream.source pins no commit
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/upstream-sync/upstream.sh verify-source-policy

      - name: Resolve upstream core (${{ inputs.mode }})
        id: resolve
        shell: bash
        env:
          RESOLVE_MODE: ${{ inputs.mode }}
          PIN_COMMIT: ${{ inputs.upstream_commit }}
        run: |
          set -euo pipefail

          case "$RESOLVE_MODE" in
            latest|locked) ;;
            *)
              echo "Invalid resolve mode: $RESOLVE_MODE (expected latest or locked)" >&2
              exit 1
              ;;
          esac

          # An explicit upstream_commit is a deliberate roadblock pin: resolve
          # locked to exactly that commit regardless of mode.
          if [[ -n "$PIN_COMMIT" ]]; then
            if [[ ! "$PIN_COMMIT" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "upstream_commit must be a hex commit SHA (7-40 chars). Got: $PIN_COMMIT" >&2
              exit 1
            fi
            echo "Roadblock pin: locking upstream resolution to $PIN_COMMIT" >&2
            eval "$(bash ./scripts/upstream-sync/upstream.sh resolve --locked --commit "$PIN_COMMIT")"
          else
            # No explicit pin: the build MUST follow the latest upstream HEAD.
            # Refuse any other mode so a stale or locked configuration can never
            # silently ship a non-HEAD core. To hold a revision,
            # pass the upstream_commit input deliberately instead.
            if [[ "$RESOLVE_MODE" != "latest" ]]; then
              echo "Refusing to resolve in '$RESOLVE_MODE' mode without an explicit upstream_commit pin." >&2
              echo "An unpinned build must resolve the latest upstream HEAD. Set mode: latest, or pass upstream_commit to pin deliberately." >&2
              exit 1
            fi
            eval "$(bash ./scripts/upstream-sync/upstream.sh resolve --latest)"
          fi

          echo "Resolved upstream commit: $R47_RESOLVED_UPSTREAM_COMMIT (mode $R47_RESOLVED_UPSTREAM_MODE)" >&2

          echo "upstream_url=$R47_RESOLVED_UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$R47_RESOLVED_UPSTREAM_COMMIT" >> "$GITHUB_OUTPUT"
          echo "upstream_short=$R47_RESOLVED_UPSTREAM_SHORT_COMMIT" >> "$GITHUB_OUTPUT"
