name: Shell Lint

on:
  workflow_dispatch:
  push:
    branches:
      - github_ci
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck repo-owned shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends shellcheck
          shellcheck --version

      - name: Lint repo-owned shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(find scripts -name '*.sh' | LC_ALL=C sort)
          printf 'Linting %d repo-owned shell scripts at --severity=warning\n' "${#shell_scripts[@]}"
          shellcheck --severity=warning "${shell_scripts[@]}"
