name: Shell Lint

on:
  workflow_dispatch:
  push:
    branches:
      - github_ci
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Lint and format-check repo-owned shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHFMT_VERSION: v3.13.1
      SHFMT_SHA256: fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends shellcheck
          shellcheck --version

      - name: Install shfmt
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" \
            --output /usr/local/bin/shfmt
          echo "${SHFMT_SHA256}  /usr/local/bin/shfmt" | sha256sum --check --status
          chmod +x /usr/local/bin/shfmt
          shfmt --version

      - name: Lint repo-owned shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(find scripts -name '*.sh' | LC_ALL=C sort)
          printf 'Linting %d repo-owned shell scripts at --severity=warning\n' "${#shell_scripts[@]}"
          shellcheck --severity=warning "${shell_scripts[@]}"

      - name: Format-check repo-owned shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(find scripts -name '*.sh' | LC_ALL=C sort)
          printf 'Format-checking %d repo-owned shell scripts with shfmt -i 4 -ci\n' "${#shell_scripts[@]}"
          shfmt -i 4 -ci -d "${shell_scripts[@]}"

  workflow-lint:
    name: Lint GitHub Actions workflows with actionlint and zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTIONLINT_VERSION: 1.7.7
      ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum --check --status
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint --version

      - name: Lint workflows with actionlint
        shell: bash
        # actionlint validates workflow syntax, expressions, glob patterns, and
        # the matrix and needs graphs -- the workflow bugs that YAML alone hides.
        # Its optional shellcheck integration is disabled: repo shell linting is
        # owned by the dedicated shellcheck job over scripts/*.sh, and the inline
        # run-block findings today are all SC2129 style plus one SC2209 false
        # positive on an intentional strip-tool name assignment.
        run: |
          set -euo pipefail
          ./actionlint -color -shellcheck=

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run zizmor
        shell: bash
        # Offline audits at medium+ severity; the three reviewed github-env writes
        # in the composite actions carry inline zizmor:ignore rationale. Online
        # audits (known-vulnerable-action lookups) are a follow-up.
        run: |
          set -euo pipefail
          uvx zizmor@1.5.2 --no-online-audits --min-severity=medium \
            .github/workflows .github/actions
