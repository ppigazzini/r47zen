# CodeQL static analysis for the repo-owned native C. Build-free scanning
# (build-mode: none) needs no toolchain, so it analyzes the Android-owned JNI
# glue and mini-gmp fallback without staging the upstream core or running Gradle.
# The upstream tree (src/, android/.staged-native) is git-ignored and absent on a
# normal checkout, so this naturally scopes to repo-owned code; paths-ignore is a
# belt-and-suspenders guard in case a run stages it. Findings surface in the
# Security tab; this lane is advisory and does not gate merges.
#
# The Kotlin app surface is intentionally NOT scanned here: CodeQL cannot extract
# Kotlin with build-mode: none (Kotlin needs a real compile), and this lane
# deliberately avoids the full Android build (SDK, NDK, staged native tree,
# upstream hydration). Scanning Kotlin would need a separate heavier job with an
# autobuild, or GitHub default-setup code scanning configured in repo settings.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze native C
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          languages: c-cpp
          build-mode: none
          config: |
            paths-ignore:
              - src
              - android/.staged-native
              - dep

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          category: "/language:c-cpp"
