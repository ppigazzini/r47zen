# CodeQL static analysis for the repo-owned native C. Build-free scanning
# (build-mode: none) needs no toolchain, so it analyzes the Android-owned JNI
# glue and mini-gmp fallback without staging the upstream core. The upstream
# tree (src/, android/.staged-native) is git-ignored and absent on a normal
# checkout, so this naturally scopes to repo-owned code; paths-ignore is a
# belt-and-suspenders guard in case a run stages it. Findings surface in the
# Security tab; this lane is advisory and does not gate merges.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze native C
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: c-cpp
          build-mode: none
          config: |
            paths-ignore:
              - src
              - android/.staged-native
              - dep

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:c-cpp"
