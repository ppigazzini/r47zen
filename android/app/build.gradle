def readDefaultValue = { String key ->
    def value = defaultsProperties.getProperty(key)?.trim()
    if (!value) {
        throw new GradleException("Missing ${key} in ${defaultsPropertiesFile}")
    }
    return value
}

def readDefaultInteger = { String key ->
    return Integer.parseInt(readDefaultValue(key))
}

def readOptionalProperty(String propertyName, String envName = null) {
    def value = project.findProperty(propertyName)?.toString()?.trim()
    if ((!value || value.isEmpty()) && envName) {
        value = System.getenv(envName)?.trim()
    }
    return value ? value : null
}

def readBooleanProperty(String propertyName, boolean defaultValue) {
    def value = project.findProperty(propertyName)?.toString()?.trim()
    if (!value) {
        return defaultValue
    }
    return value.toBoolean()
}

def readGitOutput(List<String> args) {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            workingDir rootProject.file('..')
            commandLine(['git'] + args)
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
    } catch (Exception ignored) {
        return null
    }

    def output = stdout.toString().trim()
    return output ? output : null
}

def normalizeRepositoryUrl(String url) {
    if (!url) {
        return null
    }

    def normalizedUrl = url.trim().replaceAll(/\.git$/, '')
    if (normalizedUrl.startsWith('ssh://')) {
        def sshUrl = normalizedUrl.substring('ssh://'.length()).replaceFirst(/^[^@]+@/, '')
        return "https://${sshUrl}"
    }

    if (!normalizedUrl.contains('://') && normalizedUrl.contains(':')) {
        def scpStyleUrl = normalizedUrl.replaceFirst(/^[^@]+@/, '').replaceFirst(':', '/')
        return "https://${scpStyleUrl}"
    }

    return normalizedUrl
}

