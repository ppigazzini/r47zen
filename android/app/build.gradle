tasks.register('generateRuntimeFontAssets') {
    runtimeFontAssetNames.each { fontName ->
        inputs.file(new File(runtimeFontSourceDir, fontName))
    }
    outputs.dir(generatedRuntimeAssetsDir)

    doLast {
        def generatedAssetsDir = file(generatedRuntimeAssetsDir)
        def fontsDir = new File(generatedAssetsDir, 'fonts')
        if (runtimeFontSourceDir.canonicalFile == fontsDir.canonicalFile) {
            return
