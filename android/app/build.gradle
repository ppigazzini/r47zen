def asSpdxToken = { String value ->
    value
        .replaceAll(/[^A-Za-z0-9.-]+/, '-')
        .replaceAll(/-+/, '-')
        .replaceAll(/^-|-$/, '')
}

def toSpdxRef = { String value ->
    def token = asSpdxToken(value ?: 'unknown')
    return token ? "SPDXRef-${token}" : 'SPDXRef-unknown'
}

def mapPomLicenseToSpdx = { String name, String url ->
    def haystack = "${name ?: ''} ${url ?: ''}".toLowerCase(Locale.ROOT)
    if (haystack.contains('apache') && haystack.contains('2.0')) {
        return 'Apache-2.0'
    }
    if (haystack.contains('mit')) {
        return 'MIT'
    }
    if (haystack.contains('bsd') && haystack.contains('3')) {
        return 'BSD-3-Clause'
    }
    if (haystack.contains('bsd') && haystack.contains('2')) {
        return 'BSD-2-Clause'
    }
    if (haystack.contains('eclipse public license') && haystack.contains('2.0')) {
        return 'EPL-2.0'
    }
    if (haystack.contains('mozilla public license') && haystack.contains('2.0')) {
        return 'MPL-2.0'
    }
    return null
}

def createSpdxPackage = { Map values ->
    def packageEntry = [
        SPDXID           : values.SPDXID,
        name             : values.name,
        downloadLocation : values.downloadLocation ?: 'NOASSERTION',
        filesAnalyzed    : false,
        licenseConcluded : values.licenseConcluded ?: 'NOASSERTION',
        licenseDeclared  : values.licenseDeclared ?: 'NOASSERTION',
        copyrightText    : values.copyrightText ?: 'NOASSERTION'
    ]

    [
        'versionInfo',
        'summary',
        'description',
        'homepage',
        'licenseComments',
        'sourceInfo'
    ].each { optionalKey ->
        if (values[optionalKey]) {
            packageEntry[optionalKey] = values[optionalKey]
        }
    }

    if (values.externalRefs) {
        packageEntry.externalRefs = values.externalRefs
    }

    return packageEntry
}

def resolveRepoNoticeSourceFile = { Map component ->
    def sourcePath = component.sourcePath?.toString()?.trim()
    if (!sourcePath) {
        throw new GradleException("Repo notice component is missing sourcePath: ${component}")
    }
    return new File(repositoryRootDir, sourcePath)
}

android {
    namespace = defaultApplicationId
    compileSdk = project.findProperty('r47.compileSdk')?.toInteger() ?: readDefaultInteger('R47_DEFAULT_ANDROID_COMPILE_SDK')
    def coreVersion = (project.findProperty('r47.coreVersion') ?: "unknown").toString()
    def normalizedCoreVersion = coreVersion.replaceAll(/[^0-9A-Za-z._-]/, "_")
    def releaseVersionCode = Integer.parseInt((project.findProperty('r47.versionCode') ?: readDefaultValue('R47_DEFAULT_ANDROID_VERSION_CODE')).toString())
    def releaseVersionName = (project.findProperty('r47.versionName') ?: readDefaultValue('R47_DEFAULT_ANDROID_VERSION_NAME')).toString()

    signingConfigs {
        if (isReleaseSigningConfigured) {
            release {
                storeFile = rootProject.file(releaseStoreFilePath)
                storePassword = releaseStorePassword
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
                enableV1Signing = true
                enableV2Signing = true
                enableV3Signing = true
                enableV4Signing = true
            }
        }
    }

    defaultConfig {
        applicationId = defaultApplicationId
        minSdk = project.findProperty('r47.minSdk')?.toInteger() ?: readDefaultInteger('R47_DEFAULT_ANDROID_MIN_SDK')
        targetSdk = project.findProperty('r47.targetSdk')?.toInteger() ?: readDefaultInteger('R47_DEFAULT_ANDROID_TARGET_SDK')
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        versionCode = releaseVersionCode
        versionName = releaseVersionName
        resValue "string", "about_version_summary", "R47 Android ${releaseVersionName} (Core: ${coreVersion})"
        resValue "string", "android_source_repository_url", androidSourceRepositoryUrl

        // Use property override if provided, otherwise default to a verified version
        // To use system default, user can pass -Pr47.ndkVersion=
        ndkVersion = project.findProperty('r47.ndkVersion') ?: readDefaultValue('R47_DEFAULT_ANDROID_NDK_VERSION')

        externalNativeBuild {
            cmake {
                cppFlags ""
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON", "-DR47_STAGED_CPP_DIR=${stagedNativeCppDir}"
            }
        }
        ndk {
            abiFilters(*configuredAbiFilters)
        }
    }

    buildTypes {
        debug {
            debuggable = true
            jniDebuggable = true
            // Keep the debug snapshot lane separate from a future store release.
            applicationIdSuffix = ".debug"
            versionNameSuffix = "-snapshot.${normalizedCoreVersion}"
        }
        release {
            minifyEnabled = releaseMinifyEnabled
            shrinkResources = releaseShrinkResourcesEnabled
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk {
                debugSymbolLevel = releaseNativeDebugSymbolLevel
            }
            if (isReleaseSigningConfigured) {
                signingConfig = signingConfigs.release
            }
        }
    }

    buildFeatures {
        resValues = true
        viewBinding = true
    }

    externalNativeBuild {
        cmake {
            path = "src/main/cpp/CMakeLists.txt"
            version = project.findProperty('r47.cmakeVersion') ?: readDefaultValue('R47_DEFAULT_ANDROID_CMAKE_VERSION')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.toVersion(readDefaultValue('R47_DEFAULT_ANDROID_JAVA_VERSION'))
        targetCompatibility JavaVersion.toVersion(readDefaultValue('R47_DEFAULT_ANDROID_JAVA_VERSION'))
    }

    sourceSets {
        main {
            assets.srcDir generatedComplianceAssetsDir
            assets.srcDir generatedRuntimeAssetsDir
        }
    }

    testOptions {
        unitTests.includeAndroidResources = true
    }

    lint {
        checkDependencies = true
    }

}

