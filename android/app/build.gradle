def prepareStagedNativeInputs = tasks.register('prepareStagedNativeInputs', Exec) {
    description = 'Hydrate missing authoritative native inputs, generate build.sim assets through the Android Meson/Ninja helper, and refresh android/.staged-native/cpp for direct Gradle builds.'
    outputs.upToDateWhen { false }

    def configuredBuildJobs = (project.findProperty('r47.buildJobs') ?: System.getenv('R47_BUILD_JOBS') ?: System.getenv('CMAKE_BUILD_PARALLEL_LEVEL') ?: gradle.startParameter.maxWorkerCount ?: Runtime.runtime.availableProcessors()).toString()
    def cacheBinDir = new File(System.getProperty('user.home'), ".cache/r47/xlsxio/${xlsxioSourceCommit}/bin")
    def inheritedPath = System.getenv('PATH')
    def nativePrepWorkingDir = rootProject.file('..')

    doFirst {
        def pathEntries = []
        if (cacheBinDir.isDirectory()) {
            pathEntries << cacheBinDir.absolutePath
        }
        if (inheritedPath) {
            pathEntries << inheritedPath
        }

        workingDir nativePrepWorkingDir
        environment 'PATH', pathEntries.join(File.pathSeparator)
        environment 'R47_BUILD_JOBS', configuredBuildJobs
        environment 'R47_ANDROID_STAGED_CPP_DIR', stagedNativeCppDir
        commandLine 'bash', nativePrepScript
    }
}

tasks.configureEach { task ->
    if (task.name.startsWith('configureCMake') || task.name.startsWith('generateJsonModel') || task.name.startsWith('externalNativeBuild')) {
        task.dependsOn(prepareStagedNativeInputs)
    }
}

