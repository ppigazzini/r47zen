tasks.register('generateThirdPartySpdx') {
    inputs.file(repoNoticeInventoryFile)
    repoNoticeInventory.components.each { component ->
        inputs.file(resolveRepoNoticeSourceFile(component as Map))
    }
    inputs.property('androidSourceRepositoryUrl', androidSourceRepositoryUrl ?: '')
    inputs.property('androidSourceCommit', androidSourceCommit ?: '')
    inputs.property('upstreamSourceRepositoryUrl', upstreamSourceRepositoryUrl ?: '')
    inputs.property('upstreamSourceCommit', upstreamSourceCommit ?: '')
    inputs.property('xlsxioSourceRepositoryUrl', xlsxioSourceRepositoryUrl ?: '')
    inputs.property('xlsxioSourceCommit', xlsxioSourceCommit ?: '')
    outputs.file("${generatedComplianceAssetsDir}/THIRD-PARTY.spdx.json")

    doLast {
        def generatedAssetsDir = file(generatedComplianceAssetsDir)
        generatedAssetsDir.mkdirs()

        def packages = []
        def documentDescribes = []

        def addPackage = { Map values ->
            def packageEntry = createSpdxPackage(values)
            packages << packageEntry
            documentDescribes << packageEntry.SPDXID
        }

        addPackage([
            SPDXID          : toSpdxRef('r47-android-source'),
            name            : 'r47_android',
            downloadLocation: androidSourceRepositoryUrl ?: 'NOASSERTION',
            licenseDeclared : 'GPL-3.0-only',
            versionInfo     : androidSourceCommit ?: 'unknown',
            summary         : 'Android fork source repository for the packaged R47 application.',
            sourceInfo      : 'Recorded from the local Git checkout used for this build.'
        ])

        if (upstreamSourceRepositoryUrl && upstreamSourceCommit) {
            addPackage([
                SPDXID          : toSpdxRef('r47-upstream-core'),
                name            : 'r47-upstream-core',
                downloadLocation: upstreamSourceRepositoryUrl,
                licenseDeclared : 'GPL-3.0-only',
                versionInfo     : upstreamSourceCommit,
                summary         : 'Authoritative upstream core revision synchronized into the Android build.',
                sourceInfo      : 'Recorded from the synchronized upstream core metadata for this build.'
            ])
        }

        addPackage([
            SPDXID          : toSpdxRef('xlsxio'),
            name            : 'xlsxio',
            downloadLocation: xlsxioSourceRepositoryUrl ?: 'NOASSERTION',
            licenseDeclared : 'MIT',
            versionInfo     : xlsxioSourceCommit ?: 'unknown',
            summary         : 'Vendored spreadsheet I/O dependency packaged with the Android build.',
            sourceInfo      : 'Version and source URL come from the shared Android defaults or explicit build properties.'
        ])

        addPackage([
            SPDXID          : toSpdxRef('decnumbericu'),
            name            : 'decNumberICU',
            downloadLocation: 'NOASSERTION',
            licenseDeclared : 'ICU',
            summary         : 'Vendored decimal arithmetic sources under dep/decNumberICU.',
            sourceInfo      : 'Notice source is hydrated from upstream at dep/decNumberICU/ICU-license.html during the build.'
        ])

        addPackage([
            SPDXID          : toSpdxRef('mini-gmp-fallback'),
            name            : 'mini-gmp fallback',
            downloadLocation: 'https://gmplib.org/',
            licenseDeclared : 'LGPL-3.0-or-later OR GPL-2.0-or-later',
            summary         : 'Fallback big integer implementation under android/compat/mini-gmp-fallback.',
            sourceInfo      : 'Notice text is recorded in the repo-owned notice inventory.'
        ])

        def runtimeConfiguration = configurations.findByName('releaseRuntimeClasspath') ?: configurations.findByName('debugRuntimeClasspath')
        if (runtimeConfiguration == null) {
            throw new GradleException('Unable to resolve an Android runtime classpath for SPDX inventory generation.')
        }

        def runtimeModules = runtimeConfiguration.incoming.resolutionResult.allComponents
            .collect { it.id }
            .findAll { it instanceof ModuleComponentIdentifier }
            .unique { id -> "${id.group}:${id.module}:${id.version}" }
            .sort { left, right ->
                "${left.group}:${left.module}:${left.version}" <=> "${right.group}:${right.module}:${right.version}"
            }

        runtimeModules.each { ModuleComponentIdentifier moduleId ->
            def licenses = []
            def pomUrl = null

            try {
                def pomConfiguration = configurations.detachedConfiguration(
                    dependencies.create("${moduleId.group}:${moduleId.module}:${moduleId.version}@pom")
                )
                pomConfiguration.transitive = false
                def pomFile = pomConfiguration.singleFile
                def pom = new XmlSlurper(false, false).parse(pomFile)
                licenses = pom.licenses.license.collect { licenseNode ->
                    [
                        name: licenseNode.name.text()?.trim(),
                        url : licenseNode.url.text()?.trim()
                    ]
                }
                pomUrl = pom.url.text()?.trim()
            } catch (Exception ignored) {
                licenses = []
            }

            def knownSpdxLicenses = licenses.collect { license ->
                mapPomLicenseToSpdx(license.name as String, license.url as String)
            }.findAll { it }.unique()

            def rawLicenseSummary = licenses.collect { license ->
                [license.name, license.url].findAll { it }.join(' - ')
            }.findAll { it }.join('; ')

            addPackage([
                SPDXID          : toSpdxRef("maven-${moduleId.group}-${moduleId.module}-${moduleId.version}"),
                name            : "${moduleId.group}:${moduleId.module}",
                downloadLocation: "https://repo1.maven.org/maven2/${moduleId.group.replace('.', '/')}/${moduleId.module}/${moduleId.version}",
                licenseDeclared : knownSpdxLicenses.size() == 1 ? knownSpdxLicenses[0] : 'NOASSERTION',
                versionInfo     : moduleId.version,
                homepage        : pomUrl ?: null,
                summary         : "Android runtime dependency ${moduleId.group}:${moduleId.module}:${moduleId.version}.",
                licenseComments : rawLicenseSummary ?: 'License metadata was not available in the resolved POM.',
                sourceInfo      : 'Collected from the resolved runtime classpath and each dependency POM.',
                externalRefs    : [[
                    referenceCategory: 'PACKAGE-MANAGER',
                    referenceType    : 'purl',
                    referenceLocator : "pkg:maven/${moduleId.group}/${moduleId.module}@${moduleId.version}"
                ]]
            ])
        }

        def spdxDocument = [
            spdxVersion      : 'SPDX-2.3',
            dataLicense      : 'CC0-1.0',
            SPDXID           : 'SPDXRef-DOCUMENT',
            name             : 'R47 Android third-party inventory',
            documentNamespace: "https://r47.invalid/spdx/android/${androidSourceCommit ?: 'unknown'}",
            creationInfo     : [
                created : new Date().format("yyyy-MM-dd'T'HH:mm:ss'Z'", TimeZone.getTimeZone('UTC')),
                creators: ['Tool: Gradle generateThirdPartySpdx task']
            ],
            documentDescribes: documentDescribes,
            packages         : packages
        ]

        file("${generatedAssetsDir}/THIRD-PARTY.spdx.json").text = JsonOutput.prettyPrint(JsonOutput.toJson(spdxDocument)) + '\n'
    }
}

tasks.register('generateSourceManifest') {
    inputs.property('androidSourceRepositoryUrl', androidSourceRepositoryUrl ?: '')
    inputs.property('androidSourceCommit', androidSourceCommit ?: '')
    inputs.property('upstreamSourceRepositoryUrl', upstreamSourceRepositoryUrl ?: '')
    inputs.property('upstreamSourceCommit', upstreamSourceCommit ?: '')
    inputs.property('xlsxioSourceRepositoryUrl', xlsxioSourceRepositoryUrl ?: '')
    inputs.property('xlsxioSourceCommit', xlsxioSourceCommit ?: '')
    outputs.file("${generatedComplianceAssetsDir}/SOURCE")

    doLast {
        def generatedAssetsDir = file(generatedComplianceAssetsDir)
        generatedAssetsDir.mkdirs()
        def sourceLines = []

        if (upstreamSourceRepositoryUrl && upstreamSourceCommit) {
            sourceLines << "upstream_url=${upstreamSourceRepositoryUrl}"
            sourceLines << "upstream_commit=${upstreamSourceCommit}"
        }

        sourceLines << "android_source_repository_url=${androidSourceRepositoryUrl}"
        sourceLines << "android_source_commit=${androidSourceCommit}"
        sourceLines << "xlsxio_url=${xlsxioSourceRepositoryUrl}"
        sourceLines << "xlsxio_commit=${xlsxioSourceCommit}"

        file("${generatedAssetsDir}/SOURCE").text = sourceLines.join('\n') + '\n'
    }
}

tasks.named('preBuild').configure {
    dependsOn tasks.named('copyGplLicense')
    dependsOn tasks.named('generateRuntimeFontAssets')
    dependsOn tasks.named('generateProgramFixtureAssets')
    dependsOn tasks.named('generateRepoNoticeAssets')
    dependsOn tasks.named('generateThirdPartySpdx')
    dependsOn tasks.named('generateXlsxioLicense')
    dependsOn tasks.named('generateSourceManifest')
}
