tasks.register('generateRepoNoticeAssets') {
    inputs.file(repoNoticeInventoryFile)
    repoNoticeInventory.components.each { component ->
        inputs.file(resolveRepoNoticeSourceFile(component as Map))
    }
    outputs.dir("${generatedComplianceAssetsDir}/repo-notices")

    doLast {
        def generatedAssetsDir = file(generatedComplianceAssetsDir)
        def repoAssetsDir = new File(generatedAssetsDir, 'repo-notices')
        delete(repoAssetsDir)
        repoAssetsDir.mkdirs()

        def indexEntries = []
        repoNoticeInventory.components.each { rawComponent ->
            def component = rawComponent as Map
            def sourceFile = resolveRepoNoticeSourceFile(component)
            if (!sourceFile.isFile()) {
                throw new GradleException("Missing repo notice source file: ${sourceFile}")
            }

            def assetPath = component.assetPath?.toString()?.trim()
            if (!assetPath) {
                throw new GradleException("Repo notice component is missing assetPath: ${component}")
            }

            def targetFile = new File(generatedAssetsDir, assetPath)
            targetFile.parentFile.mkdirs()
            targetFile.bytes = sourceFile.bytes

            indexEntries << [
                id              : component.id,
                title           : component.title,
                summary         : component.summary,
                assetPath       : assetPath,
                contentType     : component.contentType ?: 'text/plain',
                declaredLicense : component.declaredLicense ?: 'NOASSERTION'
            ]
        }

        def indexFile = new File(repoAssetsDir, 'NOTICE-INDEX.json')
        indexFile.text = JsonOutput.prettyPrint(JsonOutput.toJson([
            schemaVersion : repoNoticeInventory.schemaVersion ?: 1,
            title         : repoNoticeInventory.title ?: 'R47 repo-owned notices',
            entries       : indexEntries
        ])) + '\n'
    }
}

