# Pinned static minizip dev package for the local xlsxio host bootstrap fallback,
# used by scripts/android/build_android.sh only when the host has no system
# minizip (CI installs libminizip-dev from apt). Sourced from the permanent
# snapshot.debian.org archive and SHA-256 verified. Refresh both arch entries
# together to a single Debian libminizip-dev version.
