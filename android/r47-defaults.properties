# JVM unit-test total line-coverage floor enforced by coverage_gate.sh. This is
# a maintainer-ratcheted floor, not an auto-ratchet: it sits just below the
# current measured coverage so a regression fails the gate. Bump it up (never
# down) when coverage rises durably. Measured 82.86% on 2026-07-05.
R47_DEFAULT_COVERAGE_MIN_TOTAL_LINE_PERCENT=82
